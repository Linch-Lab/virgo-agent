services:
  - type: web
    name: virgo-agent-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://virgo.billlinch.com
