<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>Virgo Agent — AI Research Notebook</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#fafaf8;--card:#fff;--bdr:#d8d8d2;--txt:#1a1a1a;--muted:#666;--acc:#2c5f8a;--grn:#2a7d4f;--red:#b33;--warn:#b8860b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex}
.sidebar{width:240px;min-width:240px;background:#f5f4f0;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow-y:auto;z-index:10;flex-shrink:0}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px}
.sidebar-header .logo{font-size:16px;font-weight:700;color:var(--acc)}
.sidebar-header .badge{font-size:10px;background:var(--grn);color:#fff;padding:1px 6px;border-radius:3px}
.present-btn{font-size:9px;padding:4px 10px;margin-left:auto;border:1px solid var(--acc);background:#fff;color:var(--acc);border-radius:3px;cursor:pointer}
.present-btn:hover,.present-btn.on{background:var(--acc);color:#fff}
.nav-section{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 2px;font-size:8px;text-transform:uppercase;color:var(--muted);letter-spacing:1.5px;margin-top:6px}
.nav-section .add-page-btn{font-size:14px;cursor:pointer;color:var(--muted);line-height:1;padding:0 3px}
.nav-section .add-page-btn:hover{color:var(--acc)}
.nav-item{display:flex;align-items:center;gap:6px;padding:5px 16px 5px 18px;cursor:pointer;font-size:11px;color:var(--muted);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#edece7;color:var(--txt)}
.nav-item.active{background:#e8e6df;color:var(--acc);border-left-color:var(--acc);font-weight:600}
.nav-item .nav-actions{display:none;margin-left:auto;gap:2px}
.nav-item:hover .nav-actions{display:flex}
.nav-item .nav-actions button{font-size:8px;background:none;border:none;cursor:pointer;color:var(--muted);padding:1px 3px}
.nav-item .nav-actions button:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:10px 24px;border-bottom:1px solid var(--bdr);background:var(--bg);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.topbar-left h1{font-size:14px;font-weight:600}
.breadcrumb{font-size:9px;color:var(--muted);margin-top:2px}
.page-container{flex:1;overflow-y:auto;min-height:0}
.page{padding:20px 24px;display:none}
.page.active{display:flex;flex-direction:column;gap:16px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:18px 22px;margin-bottom:16px}
.card h3{font-size:14px;font-weight:600;margin-bottom:10px}
.card-grid{display:grid;gap:12px}
.card-grid.cols2{grid-template-columns:1fr 1fr}
.card-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.data-tbl{width:100%;font-size:10px;border-collapse:collapse;margin-top:6px}
.data-tbl th{text-align:left;padding:4px 8px;background:#f5f4f0;color:var(--muted);font-weight:500;border-bottom:1px solid var(--bdr);font-size:9px}
.data-tbl td{padding:3px 8px;border-bottom:1px solid #eee}
.data-tbl .hl{color:var(--acc);font-weight:600}
.chat-msgs{overflow-y:auto;display:flex;flex-direction:column;gap:5px;font-size:10px;max-height:200px;min-height:80px;padding:4px}
.chat-msg{padding:5px 9px;border-radius:4px;max-width:92%;line-height:1.45;font-size:10px}
.chat-msg.user{align-self:flex-end;background:var(--acc);color:#fff}
.chat-msg.agent{align-self:flex-start;background:#f0efe9;color:var(--txt);border:1px solid #e0ddd4}
.inline-editor{outline:none;min-height:60vh;font-size:13px;line-height:1.9;color:var(--txt);padding:4px 0}
.inline-editor:empty:before{content:'Click to edit…';color:var(--muted);font-style:italic}
.inline-editor:focus{outline:none}
.inline-editor h3{font-size:15px;font-weight:600;margin:16px 0 8px}
.inline-editor p{margin:6px 0}
/* Notion-style blocks */
.notion-blocks{position:relative;min-height:40vh}
.notion-block{display:flex;align-items:flex-start;gap:4px;padding:3px 0;border-radius:3px;transition:background .12s;position:relative}
.notion-block:hover{background:rgba(0,0,0,.02)}
.notion-block.dragging{opacity:.4}
.notion-block.drag-over{border-top:2px solid var(--acc)}
.block-handle{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--muted);font-size:12px;opacity:0;transition:opacity .12s;flex-shrink:0;user-select:none;border-radius:2px}
.notion-block:hover .block-handle,.block-handle.show{opacity:.5}
.notion-block:hover .block-handle:hover{opacity:1;background:rgba(0,0,0,.06)}
.block-handle:active{cursor:grabbing}
.block-content{flex:1;min-width:0;outline:none;font-size:13px;line-height:1.9;padding:2px 0;color:#000}
.block-content:empty:before{content:'Type / for commands…';color:var(--muted);font-style:italic}
.block-content h3,.block-content h2,.block-content h4{font-size:15px;font-weight:600;margin:8px 0 4px}
.block-content p{margin:4px 0}
.block-plus{position:absolute;left:-20px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;border:1px solid var(--bdr);background:var(--card);color:var(--muted);font-size:14px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.notion-block:hover .block-plus,.notion-block:last-child .block-plus{display:flex}
/* Side-by-side columns */
.block-row{display:flex;gap:12px;margin:4px 0}
.block-row>.notion-block{flex:1;min-width:0}
.block-row>.notion-block+.notion-block{border-left:1px solid var(--bdr);padding-left:12px}
.block-drop-left{box-shadow:inset 4px 0 0 var(--acc)}
.block-drop-right{box-shadow:inset -4px 0 0 var(--acc)}
.save-indicator{position:fixed;top:12px;right:24px;font-size:10px;color:var(--grn);background:var(--card);padding:4px 10px;border-radius:3px;border:1px solid var(--bdr);z-index:300;transition:opacity .3s}
.chat-input-row{display:flex;gap:4px;margin-top:4px}
.chat-input-row input{flex:1;padding:5px 8px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);font-size:10px}
.chat-input-row button{padding:5px 12px;border:1px solid var(--bdr);background:var(--acc);color:#fff;font-size:10px;cursor:pointer}
.btn{padding:5px 12px;border-radius:3px;border:1px solid var(--bdr);font-size:10px;cursor:pointer;background:var(--card);color:var(--txt)}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.prim{background:var(--acc);color:#fff;border:none}
.btn.grn{background:var(--grn);color:#fff;border:none}
.btn.red{background:var(--red);color:#fff;border:none}
.btn.sm{padding:3px 7px;font-size:9px}
.stitle{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px;font-weight:600}
label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px}
input[type=text],input[type=number],input[type=password],textarea,select{width:100%;padding:5px 8px;border:1px solid var(--bdr);font-size:10px;background:var(--card);color:var(--txt);border-radius:3px;margin-bottom:6px;font-family:inherit}
textarea{resize:vertical;min-height:40px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:4px;font-size:11px;background:var(--grn);color:#fff;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Analysis page layout */
.analysis-layout{display:flex;gap:16px;min-height:400px}
.analysis-chart{flex:1;min-width:0;background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:16px;display:flex;flex-direction:column}
.analysis-chart canvas{width:100%!important;max-height:380px}
.analysis-side{width:320px;min-width:320px;display:flex;flex-direction:column;gap:12px}
.analysis-side .card{padding:14px 16px;margin-bottom:0}
.analysis-side .card h4{font-size:11px;margin-bottom:8px;color:var(--acc)}

/* Modals */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:6px;padding:24px;width:640px;max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:14px;margin-bottom:14px}
.modal-box .csv-preview{max-height:200px;overflow:auto;font-size:9px;font-family:monospace;background:#f5f4f0;padding:8px;border-radius:3px;margin:8px 0;white-space:pre;line-height:1.4}
.modal-box .step{display:none}
.modal-box .step.active{display:block}

/* Present mode — 16:9 slide */
body.presenting{background:#1a1a1a;cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='5' fill='%23ff3333' opacity='0.9'/><circle cx='12' cy='12' r='10' fill='none' stroke='%23ff3333' stroke-width='1' opacity='0.35'/></svg>") 12 12,auto}
body.presenting *{user-select:none!important;-webkit-user-select:none!important}
body.presenting [contenteditable]{pointer-events:none;caret-color:transparent;cursor:inherit}
body.presenting .sidebar{display:none}
body.presenting .topbar{display:none}
body.presenting .main{background:#1a1a1a}
body.presenting .page-container{display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
body.presenting .slide{width:100%;max-width:calc(100vh*16/9);aspect-ratio:16/9;max-height:100vh;overflow-y:auto;overflow-x:hidden;background:var(--bg);position:relative}
body.presenting .page{padding:40px 56px;min-height:100%;box-sizing:border-box;gap:16px}
body.presenting .page.active{min-height:100%;justify-content:flex-start}
body.presenting .card{max-width:100%;margin-bottom:12px}
body.presenting .edit-btn-row{display:none}
body.presenting .inline-editor{pointer-events:none;user-select:none;-webkit-user-select:none}
body.presenting .notion-blocks{pointer-events:none;user-select:none;-webkit-user-select:none}
body.presenting .block-handle{display:none!important}
body.presenting .block-plus{display:none!important}
body.presenting .save-indicator{display:none!important}
body.presenting .slide-counter{display:block;position:fixed;bottom:16px;right:24px;font-size:12px;color:rgba(255,255,255,.6);z-index:200}
body.presenting .slide-hint{display:block;position:fixed;bottom:16px;left:24px;font-size:11px;color:rgba(255,255,255,.6);z-index:200}
/* Comic grid in present: fill the slide */
body.presenting .comic-grid{min-height:calc(100vh*9/16 - 120px);aspect-ratio:auto}
.slide-counter,.slide-hint{display:none}
/* Edit mode — subtle 16:9 max constraint */
.page-container{flex:1;overflow-y:auto;min-height:0}
.slide{width:100%;max-width:min(1200px,calc((100vh - 60px)*16/9));margin:0 auto}
/* 四格漫畫 — fixed 2x2 grid filling the page */
.comic-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;min-height:calc(100vh - 100px)}
.comic-panel{border:2px solid var(--bdr);border-radius:4px;padding:14px 16px;background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.comic-panel .cp-num{font-size:22px;font-weight:700;color:var(--acc);margin-bottom:2px;line-height:1;flex-shrink:0}
.comic-panel .cp-title{font-size:11px;font-weight:600;margin-bottom:8px;border-bottom:1px solid var(--bdr);padding-bottom:6px;flex-shrink:0}
.comic-panel .cp-body{font-size:9.5px;color:#000;line-height:1.6;flex:1;overflow-y:auto;outline:none}
.comic-panel .cp-body:focus{outline:none}
.comic-panel .cp-body b{color:var(--txt)}
.comic-panel:nth-child(1) .cp-num{color:#2c5f8a}
.comic-panel:nth-child(2) .cp-num{color:#b8860b}
.comic-panel:nth-child(3) .cp-num{color:#2a7d4f}
.comic-panel:nth-child(4) .cp-num{color:#b33}
/* Flowchart */
.flow-list{display:flex;flex-direction:column;align-items:center;gap:0}
.flow-item{display:flex;align-items:center;gap:8px;padding:12px 16px;border:2px solid var(--bdr);border-radius:6px;background:var(--card);cursor:grab;width:100%;max-width:500px;transition:all .2s;user-select:none}
.flow-item:active{cursor:grabbing}
.flow-item.dragging{opacity:.4;border-style:dashed}
.flow-item.drag-over{border-color:var(--acc);box-shadow:0 0 0 3px rgba(44,95,138,.15)}
.flow-item .flow-num{font-size:20px;font-weight:700;color:var(--acc);min-width:32px;text-align:center}
.flow-item .flow-info{flex:1;min-width:0}
.flow-item .flow-info .flow-title{font-size:11px;font-weight:600;margin-bottom:2px}
.flow-item .flow-info .flow-preview{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flow-item .flow-drag{font-size:14px;color:var(--muted);cursor:grab;padding:4px}
.flow-arrow{font-size:18px;color:var(--muted);padding:2px 0}
.flow-add{border:2px dashed var(--bdr);padding:10px 16px;border-radius:6px;width:100%;max-width:500px;text-align:center;cursor:pointer;font-size:10px;color:var(--muted);transition:all .2s}
.flow-add:hover{border-color:var(--acc);color:var(--acc)}
/* Slash command menu */
.slash-menu{position:fixed;background:var(--card);border:1px solid var(--bdr);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:2000;display:none;min-width:220px;max-height:320px;overflow-y:auto;padding:4px}
.slash-menu .slash-item{padding:6px 10px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:8px;border-radius:3px}
.slash-menu .slash-item:hover,.slash-menu .slash-item.selected{background:#edece7}
.slash-menu .slash-item .slash-icon{font-size:14px;width:22px;text-align:center}
.slash-menu .slash-item .slash-label{font-weight:600}
.slash-menu .slash-item .slash-desc{font-size:9px;color:var(--muted);margin-left:auto}
/* Floating format toolbar — appears on text selection */
.format-bar{position:fixed;background:var(--card);border:1px solid var(--bdr);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:1999;display:none;padding:4px 6px;gap:2px;align-items:center}
.format-bar button{width:30px;height:28px;border:none;background:transparent;border-radius:4px;cursor:pointer;font-size:13px;color:var(--txt);display:flex;align-items:center;justify-content:center}
.format-bar button:hover{background:#edece7}
.format-bar button.active{background:var(--acc);color:#fff}
.format-bar .fb-divider{width:1px;height:16px;background:var(--bdr);margin:0 3px}
/* Auth modal */
.auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:2000;display:none;align-items:center;justify-content:center}
.auth-overlay.show{display:flex}
.auth-box{background:var(--card);border-radius:8px;padding:32px;width:380px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.auth-box h3{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--acc)}
.auth-box .auth-sub{font-size:10px;color:var(--muted);margin-bottom:18px}
.auth-box label{font-size:10px;color:var(--muted);margin-bottom:3px;display:block}
.auth-box input[type=email],.auth-box input[type=password]{width:100%;padding:8px 10px;border:1px solid var(--bdr);font-size:12px;background:var(--card);color:var(--txt);border-radius:4px;margin-bottom:10px;font-family:inherit}
.auth-box .auth-err{font-size:9px;color:var(--red);margin-bottom:8px;min-height:14px}
.auth-box .auth-actions{display:flex;gap:8px;align-items:center}
.auth-box .auth-actions button{flex:1;padding:8px;border-radius:4px;font-size:11px;cursor:pointer;border:none;font-family:inherit}
.auth-box .auth-actions button.prim{background:var(--acc);color:#fff}
.auth-box .auth-actions button.sec{background:transparent;color:var(--acc);border:1px solid var(--acc)}
.auth-box .auth-toggle{font-size:10px;color:var(--muted);margin-top:12px;text-align:center;cursor:pointer}
.auth-box .auth-toggle span{color:var(--acc);text-decoration:underline}
/* Auth button in sidebar */
.sidebar-auth{padding:8px 16px;border-top:1px solid var(--bdr);margin-top:auto;display:flex;align-items:center;gap:8px;font-size:10px}
.sidebar-auth .auth-user{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.sidebar-auth .auth-btn{padding:3px 8px;border:1px solid var(--bdr);background:var(--card);color:var(--txt);border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit}
.sidebar-auth .auth-btn:hover{border-color:var(--acc);color:var(--acc)}
.sidebar-auth .auth-btn.login-btn{background:var(--acc);color:#fff;border:none}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <span class="logo">Virgo Agent</span>
    <button class="present-btn" onclick="togglePresent()">▶ Present</button>
  </div>
  <div id="sidebarNav"></div>
  <div class="sidebar-auth" id="sidebarAuth">
    <span class="auth-user" id="sidebarAuthUser">Not logged in</span>
    <button class="auth-btn login-btn" onclick="showAuthModal()" id="sidebarAuthBtn">Login</button>
  </div>
</div>

<div class="main">
<div class="topbar">
  <div class="topbar-left"><h1 id="pageTitle">Virgo Agent</h1><div class="breadcrumb" id="breadcrumb"></div></div>
  <div class="topbar-actions"><span id="dbStatus" style="font-size:9px;color:var(--muted)"></span><button class="btn sm" onclick="exportAllJSON()">📥 Export</button><button class="btn sm prim present-btn" onclick="togglePresent()">▶ Present</button></div>
</div>
<div class="page-container" id="pageContainer"></div>
</div>

<!-- Analysis Modal -->
<div class="modal-overlay" id="analysisModal">
  <div class="modal-box">
    <div id="amStep1" class="step active">
      <h3>🔬 New Analysis</h3>
      <label>Select Skill</label>
      <select id="amSkill" onchange="updateSkillDesc()"></select>
      <div id="amSkillDesc" style="font-size:9px;color:var(--muted);margin:4px 0 8px"></div>
      <label>Changed Parameter</label>
      <input type="text" id="amParam" placeholder="e.g. CVD temperature = 970°C">
      <label>Upload CSV Data</label>
      <input type="file" id="amFile" accept=".csv,.txt" onchange="previewCSV()">
      <div class="csv-preview" id="amPreview"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn prim" onclick="processAnalysis()" id="amProcessBtn" disabled>🤖 Process with AI</button>
        <button class="btn" onclick="closeAnalysisModal()">Cancel</button>
      </div>
    </div>
    <div id="amStep2" class="step">
      <h3>⏳ AI Processing...</h3>
      <div id="amProgress" style="font-size:10px;color:var(--muted)">Uploading data to DeepSeek...</div>
    </div>
  </div>
</div>

<!-- Page Editor Modal -->
<div class="modal-overlay" id="pageEditor">
  <div class="modal-box">
    <h3 id="peTitle">New Page</h3>
    <input type="hidden" id="peId"><label>Section</label><input type="text" id="peSection"><label>Title</label><input type="text" id="peName">
    <label>Content</label>
    <div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap">
      <button class="btn sm" onclick="execCmd('bold')" title="Bold"><b>B</b></button>
      <button class="btn sm" onclick="execCmd('italic')" title="Italic"><i>I</i></button>
      <button class="btn sm" onclick="execCmd('formatBlock','h3')" title="Heading">H3</button>
      <button class="btn sm" onclick="execCmd('insertUnorderedList')" title="Bullet List">• List</button>
    </div>
    <div id="peContent" contenteditable="true" style="min-height:200px;max-height:400px;overflow-y:auto;border:1px solid var(--bdr);padding:12px;font-size:12px;line-height:1.7;background:var(--card);border-radius:3px;outline:none;font-family:Georgia,'Times New Roman',serif"></div>
    <div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim" onclick="savePage()">💾 Save</button><button class="btn" onclick="closeEditor()">Cancel</button><button class="btn red sm" id="peDelete" style="display:none;margin-left:auto" onclick="deletePage()">🗑 Delete</button></div>
  </div>
</div>


<!-- Literature Editor Modal -->
<div class="modal-overlay" id="litEditor">
  <div class="modal-box">
    <h3 id="litTitle">📚 Add Literature</h3>
    <input type="hidden" id="litId"><input type="hidden" id="litSection">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="btn sm" onclick="litImportBibtex()" style="flex:1">📋 Import BibTeX</button>
      <button class="btn sm" onclick="litImportUrl()" style="flex:1">🔗 Paste URL</button>
    </div>
    <div class="card-grid cols2">
      <div><label>Title</label><input type="text" id="litTitleField" placeholder="Paper title"></div>
      <div><label>Authors</label><input type="text" id="litAuthors" placeholder="Last, First and Last, First"></div>
    </div>
    <div class="card-grid cols2">
      <div><label>Journal</label><input type="text" id="litJournal" placeholder="Journal name"></div>

async function tryRestoreSession(){
  if(!supabase)return;

    var session=await supabase.auth.getSession();

function updateAuthUI(){

function showAuthModal(){
  document.getElementById('authEmail').value='';

function closeAuthModal(){

function toggleAuthMode(){

async function handleAuthSubmit(){
  var email=document.getElementById('authEmail').value.trim();

    var result;

// ═══════════════════════════════════════════
// Database layer — Supabase-first with IndexedDB fallback
// ═══════════════════════════════════════════

function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=(e)=>{const d=e.target.result;if(!d.objectStoreNames.contains('experiments'))d.createObjectStore('experiments',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});if(!d.objectStoreNames.contains('chat_history'))d.createObjectStore('chat_history',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('pages'))d.createObjectStore('pages',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('skills'))d.createObjectStore('skills',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('analyses'))d.createObjectStore('analyses',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('projects'))d.createObjectStore('projects',{keyPath:'id',autoIncrement:true});if(!d.objectStoreNames.contains('literature'))d.createObjectStore('literature',{keyPath:'id',autoIncrement:true});};req.onsuccess=(e)=>{db=e.target.result;resolve(db)};req.onerror=(e)=>reject(e.target.error)})}

// Internal IndexedDB-only operations (kept for fallback)
function _dbPut(s,d){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).put(d);t.oncomplete=()=>{r(q.result);scheduleMirror()};t.onerror=(e)=>j(e.target.error)})}
function _dbGetAll(s){return new Promise((r,j)=>{const t=db.transaction(s,'readonly');const q=t.objectStore(s).getAll();t.oncomplete=()=>r(q.result);t.onerror=(e)=>j(e.target.error)})}
function _dbGet(s,k){return new Promise((r,j)=>{const t=db.transaction(s,'readonly');const q=t.objectStore(s).get(k);t.oncomplete=()=>r(q.result);t.onerror=(e)=>j(e.target.error)})}
function _dbDelete(s,k){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).delete(k);t.oncomplete=()=>{r();scheduleMirror()};t.onerror=(e)=>j(e.target.error)})}
function _dbClear(s){return new Promise((r,j)=>{const t=db.transaction(s,'readwrite');const q=t.objectStore(s).clear();t.oncomplete=()=>{r();scheduleMirror()};t.onerror=(e)=>j(e.target.error)})}

// Check if we should use Supabase for this operation
function _useSupabase(){return supabaseReady&&supabase&&authUser;}

// Wrapped data operations: try Supabase first, fall back to IndexedDB
async function dbPut(s,d){
  if(_useSupabase()){
    try{
      // Remove undefined values for Supabase compatibility
      var clean={};for(var k in d){if(d[k]!==undefined)clean[k]=d[k];}
      var result=await supabase.from(s).upsert(clean).select();
      if(result.error)throw result.error;
      // Also mirror to IndexedDB for offline access
      if(result.data&&result.data.length>0){
        try{
          var supData=result.data[0];
          // Map Supabase id back to IndexedDB key if auto-increment
          if(s!=='settings'){clean.id=supData.id;}
          await _dbPut(s,clean);
        }catch(e){console.warn('IDB mirror failed',e);}
      }
      scheduleMirror();
      return result.data[0]?result.data[0].id:(d.id||undefined);
    }catch(e){
      console.warn('Supabase put failed, falling back to IndexedDB:',s,e.message);
      return _dbPut(s,d);
    }
  }
  return _dbPut(s,d);
}

async function dbGetAll(s){
  if(_useSupabase()){
    try{
      var result=await supabase.from(s).select('*').order('id',{ascending:false});
      if(result.error)throw result.error;
      return result.data||[];
    }catch(e){
      console.warn('Supabase getAll failed, falling back to IndexedDB:',s,e.message);
      return _dbGetAll(s);
    }
  }
  return _dbGetAll(s);
}

async function dbGet(s,k){
  if(_useSupabase()){
    try{
      var result=await supabase.from(s).select('*').eq('id',k).single();
      if(result.error){
        // If not found, it's ok — return null
        if(result.error.code==='PGRST116')return null;
        throw result.error;
      }
      return result.data||null;
    }catch(e){
      if(e.code==='PGRST116')return null;
      console.warn('Supabase get failed, falling back to IndexedDB:',s,k,e.message);
      return _dbGet(s,k);
    }
  }
  return _dbGet(s,k);
}

async function dbDelete(s,k){
  if(_useSupabase()){
    try{
      var result=await supabase.from(s).delete().eq('id',k);
      if(result.error)throw result.error;
      // Also delete from IndexedDB mirror
      try{await _dbDelete(s,k);}catch(e){}
      scheduleMirror();
      return;
    }catch(e){
      console.warn('Supabase delete failed, falling back to IndexedDB:',s,k,e.message);
      return _dbDelete(s,k);
    }
  }
  return _dbDelete(s,k);
}

function dbClear(s){
  // dbClear is destructive — only use IndexedDB, never Supabase
  return _dbClear(s);
}

// ══════════ P0: localStorage crash mirror ══════════
var _mirrorTimer=null;
const MIRROR_KEY='_virgo_backup';
function scheduleMirror(){
  clearTimeout(_mirrorTimer);
  _mirrorTimer=setTimeout(mirrorToLocalStorage,2000);
}
async function mirrorToLocalStorage(){
  try{
    const stores=['pages','settings','projects','skills','literature','analyses','experiments','chat_history'];
    var snap={_v:2,_ts:new Date().toISOString(),stores:{}};
    for(var s of stores){
      try{snap.stores[s]=await dbGetAll(s)||[]}catch(e){snap.stores[s]=[]}
    }
    var json=JSON.stringify(snap);
    // If too large, drop heavy stores
    if(json.length>4*1024*1024){ // >4MB
      delete snap.stores.analyses;delete snap.stores.chat_history;delete snap.stores.experiments;
      json=JSON.stringify(snap);
    }
    if(json.length>5*1024*1024){console.warn('Mirror still too large, skipping');return}
    localStorage.setItem(MIRROR_KEY,json);
  }catch(e){console.warn('Mirror failed',e)}
}
// ══════════ P0: Auto-recover from localStorage ══════════
async function recoverFromMirror(){
  try{
    var raw=localStorage.getItem(MIRROR_KEY);
    if(!raw)return false;
    var snap=JSON.parse(raw);
    if(!snap||!snap.stores||snap._v<2)return false;
    for(var s in snap.stores){
      var records=snap.stores[s];
      for(var r of records)await dbPut(s,r);
    }
    console.log('Recovered from localStorage mirror:',Object.keys(snap.stores).map(function(k){return k+':'+snap.stores[k].length}).join(', '));
    return true;
  }catch(e){console.warn('Recovery failed',e);return false}
}

  {section:'Goals',title:'3. Goals',content:`<div class="card"><h3>Project Goals</h3><table class="data-tbl"><tr><th>#</th><th>Goal</th><th>Status</th></tr><tr><td>1</td><td>CVD temperature optimization (850–1050°C)</td><td>✅ 970°C optimal</td></tr><tr><td>2</td><td>Coating characterization (SEM, Raman)</td><td>✅ ID/IG=0.42, 1.65μm</td></tr><tr><td>3</td><td>Corrosion test (150°C, pH 3 H₃PO₄)</td><td>✅ −58% icorr</td></tr><tr><td>4</td><td>Single-cell performance</td><td>✅ 763 mA/cm² @ 0.6V</td></tr><tr><td>5</td><td>200h durability test</td><td>✅ −48% decay</td></tr></table></div>`},
  {section:'Experimental',title:'1. APCVD',content:`<div class="card"><h3>Step 1 — APCVD Graphite Coating</h3><div class="comic-grid"><div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body"><b>Substrate:</b> Ni foam (1.6 mm, 95% porosity)<br><b>Precursor:</b> CH₄ (99.9%)<br><b>Carrier gas:</b> Ar (99.999%)<br><b>Pressure:</b> Atmospheric<br><b>Reactor:</b> Horizontal quartz tube furnace<br><b>Deposition time:</b> 30 min</div></div><div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body"><b>Temperature:</b> 850 / 900 / 950 / 970 / 1000 / 1050 °C<br><b>Gas flow ratio:</b> CH₄:Ar = 1:4<br><br><i>970 °C selected as optimum — balances graphitization (low ID/IG) with thickness uniformity.</i></div></div><div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body"><b>SEM</b> — surface morphology & coverage<br><b>Raman</b> — ID/IG ratio (defect density)<br><b>Cross-section SEM</b> — coating thickness<br><b>XRD</b> — crystallinity & phase</div></div><div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body"><b>ID/IG ⩽ 0.5</b> — sufficient graphitization<br><b>Thickness 1.5–2.0 μm</b> — uniform coverage<br><b>No exposed Ni</b> — full coverage in SEM<br><br>✅ <b>Result:</b> ID/IG = 0.42, thickness = 1.65 μm @ 970 °C</div></div></div></div>`},
  {section:'Experimental',title:'2. Corrosion',content:`<div class="card"><h3>Step 2 — Corrosion Test</h3><div class="comic-grid"><div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body"><b>Electrolyte:</b> H₃PO₄ (pH 3, conc. 0.5 M)<br><b>Temperature:</b> 150 °C<br><b>Cell:</b> 3-electrode (Pt counter, Ag/AgCl ref.)<br><b>Scan rate:</b> 1 mV/s<br><b>Exposure:</b> 24 h pre-immersion</div></div><div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body"><b>Sample type:</b> Bare Ni foam vs. Graphite/Ni foam<br><b>Coating temperature:</b> 970 °C (optimal from Step 1)<br><br><i>Graphite coating acts as a physical barrier — suppresses Ni dissolution & oxidation in hot H₃PO₄.</i></div></div><div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body"><b>Potentiodynamic polarization</b> — icorr, Ecorr<br><b>EIS</b> — Rohm, Rct (charge transfer resistance)<br><b>Post-mortem SEM</b> — surface degradation</div></div><div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body"><b>icorr reduction > 50%</b> vs bare Ni<br><b>Rct increase > 2×</b> — higher corrosion resistance<br><b>No visible pitting</b> — post-test SEM<br><br>✅ <b>Result:</b> icorr −58% (2.10→0.88 μA/cm²), Rct 2.4× (1240→2950 Ω cm²)</div></div></div></div>`},
  {section:'Experimental',title:'3. Assembly',content:`<div class="card"><h3>Step 3 — MEA & Single-Cell Assembly</h3><div class="comic-grid"><div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body"><b>Membrane:</b> PBI (phosphoric acid-doped)<br><b>Catalyst:</b> Pt/C (0.5 mgPt/cm² both sides)<br><b>Active area:</b> 5 cm²<br><b>GDL:</b> Carbon paper (Toray 060)<br><b>Torque:</b> 5 N·m (uniform compression)</div></div><div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body"><b>Bipolar plate:</b> Bare Ni vs. Graphite/Ni foam<br><b>Gasket:</b> PTFE, thickness matched to GDL compression<br><br><i>Graphite coating on Ni foam serves as both corrosion barrier and conductive bipolar plate — eliminates graphite plate machining cost.</i></div></div><div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body"><b>Leak test:</b> N₂ pressurization @ 0.5 bar<br><b>Contact resistance:</b> 4-probe method<br><b>Cross-section:</b> verify layer alignment</div></div><div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body"><b>Leak rate < 0.1 mL/min</b> — gas tight<br><b>Contact resistance < 20 mΩ cm²</b><br><b>OCV > 0.90 V</b> — no short circuit<br><br>✅ <b>Result:</b> No leak, contact resistance 12 mΩ cm², OCV 0.93 V</div></div></div></div>`},
  {section:'Experimental',title:'4. Performance',content:`<div class="card"><h3>Step 4 — Single-Cell Performance</h3><div class="comic-grid"><div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body"><b>Fuel:</b> H₂ (99.999%, 200 mL/min)<br><b>Oxidant:</b> Air (400 mL/min)<br><b>No humidification</b> — HT-PEMFC<br><b>Back pressure:</b> Ambient<br><b>Activation:</b> 2 h @ 0.6 V before test</div></div><div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body"><b>Temperature:</b> 160 / 170 / 180 °C<br><b>Bipolar plate:</b> Bare Ni vs. Graphite/Ni<br><br><i>Higher temperature → faster kinetics + reduced Pt poisoning. Graphite plate prevents Ni corrosion that poisons catalyst.</i></div></div><div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body"><b>I-V polarization</b> — OCV, i@0.6V, peak power<br><b>EIS @ 0.6V</b> — Rohm, Rct, Rmt<br><b>HFR</b> — high-frequency resistance</div></div><div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body"><b>i@0.6V > 700 mA/cm²</b> @ 180 °C<br><b>Peak power > 400 mW/cm²</b><br><b>Rohm < 100 mΩ cm²</b><br><br>✅ <b>Result:</b> 763 mA/cm² @ 0.6V, 458 mW/cm² peak, Rohm 72 mΩ cm² @ 180 °C (Graphite)</div></div></div></div>`},
  {section:'Experimental',title:'5. Durability',content:`<div class="card"><h3>Step 5 — 200h Durability Test</h3><div class="comic-grid"><div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body"><b>Mode:</b> Galvanostatic (constant current)<br><b>Current density:</b> 200 mA/cm²<br><b>Temperature:</b> 180 °C<br><b>H₂/Air flow:</b> 200/400 mL/min<br><b>Sampling:</b> I-V + EIS every 50 h</div></div><div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body"><b>Bipolar plate:</b> Bare Ni vs. Graphite/Ni<br><br><i>Long-term corrosion of Ni plate poisons catalyst (Ni²⁺ replaces H⁺ in PBI). Graphite barrier prevents this degradation pathway.</i></div></div><div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body"><b>Voltage monitoring</b> — continuous @ 200 mA/cm²<br><b>EIS every 50 h</b> — track Rct growth<br><b>Post-mortem ICP</b> — Ni dissolution in MEA<br><b>Post-mortem SEM</b> — plate surface</div></div><div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body"><b>Voltage decay < 0.3 mV/h</b><br><b>OCV drop < 20 mV</b> over 200 h<br><b>Rct growth < 50%</b> — minimal catalyst poisoning<br><br>✅ <b>Result:</b> 0.25 mV/h decay, −18 mV OCV drop, Rct growth +45% (Graphite vs −48% improvement over Bare)</div></div></div></div>`},
  {section:'Results',title:'1. APCVD Results',content:`<div class="card"><h3>CVD Temperature Optimization</h3><table class="data-tbl"><tr><th>Temp (°C)</th><th>Coating</th><th>ID/IG</th><th>Thickness (μm)</th></tr><tr><td>850</td><td>Partial</td><td>0.89</td><td>0.3–0.8</td></tr><tr><td>900</td><td>Moderate</td><td>0.72</td><td>0.6–1.2</td></tr><tr><td>950</td><td>Good</td><td>0.55</td><td>1.0–1.5</td></tr><tr style="background:#f0faf0"><td><b>970</b></td><td><b>Excellent</b></td><td><b>0.42</b></td><td><b>1.65</b></td></tr><tr><td>1000</td><td>Good</td><td>0.38</td><td>1.8–2.2</td></tr></table></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\'5.1 APCVD Results\')">+ Add Analysis</button></div>`},
  {section:'Results',title:'2. Corrosion Results',content:`<div class="card"><h3>Corrosion Test</h3><table class="data-tbl"><tr><th>Sample</th><th>icorr (μA/cm²)</th><th>Ecorr (V)</th><th>Rct (Ω cm²)</th></tr><tr><td>Bare Ni</td><td>2.10</td><td>−0.32</td><td>1240</td></tr><tr style="background:#f0faf0"><td><b>Graphite</b></td><td><b>0.88</b></td><td><b>−0.18</b></td><td><b>2950</b></td></tr></table></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\'5.2 Corrosion Results\')">+ Add Analysis</button></div>`},
  {section:'Results',title:'3. Assembly Results',content:`<div class="card"><h3>Assembly & Contact Resistance</h3><table class="data-tbl"><tr><th>Metric</th><th>Bare Ni</th><th>Graphite/Ni</th></tr><tr><td>Contact Resistance (mΩ cm²)</td><td>8.5</td><td>12.0</td></tr><tr><td>Leak Rate (mL/min)</td><td><0.1</td><td><0.1</td></tr><tr><td>OCV (V)</td><td>0.91</td><td>0.93</td></tr></table></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\'5.3 Assembly Results\')">+ Add Analysis</button></div>`},
  {section:'Results',title:'4. Performance Results',content:`<div class="card"><h3>Polarization I-V</h3><table class="data-tbl"><tr><th>Temp</th><th>Sample</th><th>OCV (V)</th><th>i@0.6V (mA/cm²)</th><th>Peak Power (mW/cm²)</th></tr><tr><td>160°C</td><td>Bare</td><td>0.92</td><td>380</td><td>228</td></tr><tr><td>160°C</td><td>Graphite</td><td>0.94</td><td>498</td><td>299</td></tr><tr><td>170°C</td><td>Bare</td><td>0.91</td><td>470</td><td>282</td></tr><tr><td>170°C</td><td>Graphite</td><td>0.93</td><td>625</td><td>375</td></tr><tr style="background:#f0faf0"><td><b>180°C</b></td><td><b>Graphite</b></td><td><b>0.93</b></td><td><b>763</b></td><td><b>458</b></td></tr></table></div><div class="card"><h3>EIS Analysis</h3><table class="data-tbl"><tr><th>Sample</th><th>Rohm</th><th>Rct</th><th>Rmt</th></tr><tr><td>Graphite 0h</td><td>72</td><td>165</td><td>78</td></tr><tr><td>Graphite 200h</td><td>88</td><td>240</td><td>112</td></tr></table></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\'5.4 Performance Results\')">+ Add Analysis</button></div>`},
  {section:'Results',title:'5. Durability Results',content:`<div class="card"><h3>200h Durability</h3><table class="data-tbl"><tr><th>Metric</th><th>Bare Ni</th><th>Graphite</th></tr><tr><td>Voltage decay</td><td>0.48 mV/h</td><td>0.25 mV/h</td></tr><tr><td>OCV drop</td><td>−45 mV</td><td>−18 mV</td></tr></table></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\'5.5 Durability Results\')">+ Add Analysis</button></div>`},

// ═══════════════════════════════════════
// SEED ALL
// ═══════════════════════════════════════
async function seedAll(){
  const pages=await dbGetAll('pages'),skills=await dbGetAll('skills');

  if(pages.length===0)for(const p of SEED_PAGES)await dbPut('pages',{section:p.section,title:p.title,content:p.content,projectId:defProj||undefined,createdAt:new Date().toISOString()});
  if(skills.length===0)for(const s of SEED_SKILLS)await dbPut('skills',{name:s.name,category:s.category,desc:s.desc,keyParams:s.keyParams,chartType:s.chartType,chartTemplate:s.chartTemplate,createdAt:new Date().toISOString()});
  // Migration: add chart pages if missing
  if(pages.length>0&&!pages.some(p=>p.section==='Charts')){
    const chartPages=[{section:'Charts',title:'📈 CVD Raman',content:`<div class="card"><h3>CVD Raman ID/IG</h3><canvas id="chart_cvd_raman"></canvas></div><'+'script class="chart-init">new Chart(document.getElementById("chart_cvd_raman"),{type:"bar",data:{labels:["850","900","950","970","1000","1050"],datasets:[{data:[0.89,0.72,0.55,0.42,0.38,0.35],backgroundColor:"#2c5f8a"}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0.2,max:1}}}}<\/script>`}];
    for(const p of chartPages)await dbPut('pages',{section:p.section,title:p.title,content:p.content,createdAt:new Date().toISOString()});
  }
  // (step page migration now handled by force-reseed below)
  // Migration: restructure old pages to new hierarchy
  var allP=await dbGetAll('pages');
  for(const p of allP){
    var changed=false;
    // Rename section: Project -> Purpose or Goals
    if(p.section==='Project'){
      if(p.title==='1. Purpose'){p.section='Purpose';changed=true}
      else if(p.title==='2. Goals'){p.section='Goals';p.title='3. Goals';changed=true}
    }
    // Renumber Experimental: 3.x -> 4.x
    if(p.section==='Experimental'){
      if(p.title==='3. Flowchart'){p.title='4. Flowchart';changed=true}
      else{var m3=p.title.match(/^3\.(\d+)\s*(.*)/);if(m3){p.title='4.'+m3[1]+(m3[2]?' '+m3[2]:'');changed=true}}
    }
    // Renumber Results: 4.x -> 5.x
    if(p.section==='Results'){
      if(p.title==='4.1 CVD Optimization'){p.title='5.1 APCVD Results';changed=true}
      else if(p.title==='4.2 Corrosion Results'){p.title='5.2 Corrosion Results';changed=true}
      else if(p.title==='4.3 Polarization'){p.title='5.4 Performance Results';changed=true}
      else if(p.title==='4.4 EIS'){p.title='5.4 Performance Results';changed=true}
      else if(p.title==='4.5 Durability'){p.title='5.5 Durability Results';changed=true}
      else{var m4=p.title.match(/^4\.(\d+)\s*(.*)/);if(m4){p.title=m4[1]+'.'+(m4[2]?m4[2]:'');changed=true}}
    }
    if(changed)await dbPut('pages',p);
  }
  // Migration: project system
  const projects=await dbGetAll('projects');
  var defProj=null;
  if(projects.length===0){
    defProj=await dbPut('projects',{name:'NiF-Graphite-001',createdAt:new Date().toISOString()});
  }else{defProj=projects[0].id}
  // Assign projectId to orphaned pages
  var allP=await dbGetAll('pages');
  for(const p of allP){if(!p.projectId){p.projectId=defProj;await dbPut('pages',p)}}
  // Assign projectId to orphaned analyses
  const allA=await dbGetAll('analyses');
  for(const a of allA){if(!a.projectId){a.projectId=defProj;await dbPut('analyses',a)}}
  // Set active project if not set
  if(!(await dbGet('settings','activeProjectId')))
    await dbPut('settings',{key:'activeProjectId',value:defProj});
  // Add missing Literature/Resources/Output seed pages
  var seedExtra=SEED_PAGES.filter(function(p){
    return ['Literature','Resources','Output'].indexOf(p.section)>=0;
  });
  var cp=await dbGetAll('pages');
  for(var sp of seedExtra){
    if(!cp.some(function(p){return p.section===sp.section&&p.title===sp.title}))
      await dbPut('pages',{section:sp.section,title:sp.title,content:sp.content,projectId:defProj,createdAt:new Date().toISOString()});
  }
  // One-time migration flag — prevents destructive cleanup on every load
  // New projects created by the user are NEVER touched by migration.
  var migrationRan=await dbGet('settings','migration_v10_ran');
  if(!migrationRan){
    // Cleanup: delete stale pages from old sections (defProj only)
    const STALE_SECTIONS=['Project','Project+','Settings','Settings+','Templates','Charts','Charts+'];
    const STALE_TITLES=['📈 CVD Raman','1.1 Literature','4. Flowchart'];
    var allP2=await dbGetAll('pages');
    for(var p of allP2){
      if(p.projectId&&p.projectId!==defProj)continue;
      var del=false;
      if(STALE_SECTIONS.indexOf(p.section)>=0)del=true;
      if(STALE_TITLES.indexOf(p.title)>=0)del=true;
      if(p.section&&p.section.indexOf('+')>=0&&STALE_SECTIONS.indexOf(p.section)<0)del=true;
      if(del)await dbDelete('pages',p.id);
    }
    // Deduplicate pages for defProj only (keep first by id for each section+title)
    var allP3=await dbGetAll('pages');
    var seen={};
    for(var p of allP3){
      if(p.projectId&&p.projectId!==defProj)continue;
      var key=p.section+'||'+p.title;
      if(seen[key]){await dbDelete('pages',p.id);}
      else{seen[key]=true;}
    }
    // Step 2: Renumber Experimental pages (consolidate to 1., 2., 3. ...)
    allP3=await dbGetAll('pages');
    var expPages=allP3.filter(function(p){return p.section==='Experimental'&&p.title.match(/^\d+\./)&&(!p.projectId||p.projectId===defProj);});
    expPages.sort(function(a,b){return (a.id||0)-(b.id||0);});
    for(var i=0;i<expPages.length;i++){
      var p=expPages[i];
      var base=p.title.replace(/^\d+\.\s*/,'');
      var newTitle=(i+1)+'. '+base;
      if(p.title!==newTitle){p.title=newTitle;await dbPut('pages',p);}
    }
    // Step 3: Renumber old Results pages with "5.x" prefix (defProj only)
    allP3=await dbGetAll('pages');
    for(var p of allP3){
      if(p.section==='Results'&&(!p.projectId||p.projectId===defProj)){
        var m5=p.title.match(/^5\.(\d+)\s+(.*)/);
        if(m5){p.title=m5[1]+'. '+m5[2];await dbPut('pages',p);}
      }
    }
    // Step 4: Seed missing Experimental step pages from SEED_PAGES (defProj only)
    const stepsSeed=SEED_PAGES.filter(function(p){return p.section==='Experimental'&&p.title.match(/^\d+\./);});
    allP3=await dbGetAll('pages');
    for(var sp of stepsSeed){
      if(!allP3.some(function(p){return p.section==='Experimental'&&p.title===sp.title&&(!p.projectId||p.projectId===defProj);}))
        await dbPut('pages',{section:sp.section,title:sp.title,content:sp.content,projectId:defProj,createdAt:new Date().toISOString()});
    }
    // Step 5: Sync Results pages for each Experimental step (defProj only)
    allP3=await dbGetAll('pages');
    var expSteps=allP3.filter(function(p){return p.section==='Experimental'&&(!p.projectId||p.projectId===defProj);});
    expSteps.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
    for(var p of expSteps){
      var m=p.title.match(/^(\d+)\.\s*(.*)/);
      if(m)await syncResultsForStep(parseInt(m[1]),p.title,defProj);
    }
    // Rebuild flow order from scratch to avoid stale ids
    var newOrder=expSteps.map(function(p){return p.id;});
    await dbPut('settings',{key:'flowchart_order_'+defProj,value:newOrder});
    // Mark migration as done — NEVER run destructive steps again
    await dbPut('settings',{key:'migration_v10_ran',value:true});
  }
  // v11: Fix corrupted Experimental pages caused by parseBlocks walking block HTML
  var migrationV11=await dbGet('settings','migration_v11_comic_fix');
  if(!migrationV11){
    await dbPut('settings',{key:'migration_v11_comic_fix',value:true});
    var allP=await dbGetAll('pages');
    var stepsSeed=SEED_PAGES.filter(function(p){return p.section==='Experimental'&&p.title.match(/^\d+\./)});
    var defProjId=(await dbGet('settings','activeProjectId'))||{};
    defProjId=defProjId.value;
    for(var p of allP){
      if(p.section==='Experimental'&&(!p.projectId||p.projectId==defProjId)){
        var seed=stepsSeed.find(function(s){return s.title===p.title;});
        if(seed){p.content=seed.content;await dbPut('pages',p);}
      }
    }
  }
}

async function deleteProject(){
  var pid=activeProjectId;
  if(!pid)return;
  var projs=await dbGetAll('projects');
  if(projs.length<=1){toast('Cannot delete last project','var(--red)');return}
  var name=activeProjectName||'Project #'+pid;
  if(!confirm('Delete project "'+name+'" and ALL its pages/analyses?'))return;
  // Delete pages & analyses for this project
  var allPages=await dbGetAll('pages'),allA=await dbGetAll('analyses');
  for(var p of allPages){if(p.projectId===pid)await dbDelete('pages',p.id)}
  for(var a of allA){if(a.projectId===pid)await dbDelete('analyses',a.id)}

  projs=await dbGetAll('projects');
  if(projs.length>0)await switchProject(projs[0].id);

function esc(s){return(typeof s==='string'&&s)?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function escAttr(s){return(typeof s==='string'&&s)?s.replace(/'/g,"\\'").replace(/"/g,'&quot;'):''}

// ═══════════════════════════════════════
var currentBlockPageId=null,blockSaveTimer=null;

function parseBlocks(html){
  if(!html||html.trim()===''||html==='<i>Click to edit…</i>')return [{type:'p',content:''}];
  var div=document.createElement('div');div.innerHTML=html;
  var blocks=[];
  function walk(node){
    if(node.nodeType===3){var t=node.textContent.trim();if(t)blocks.push({type:'p',content:t});return;}
    if(node.nodeType!==1)return;
    var tag=node.tagName.toLowerCase();
    if(tag==='h1'||tag==='h2'||tag==='h3'||tag==='h4'){blocks.push({type:tag,content:node.innerHTML});return;}
    if(tag==='p'){blocks.push({type:'p',content:node.innerHTML});return;}
    if(tag==='ul'){Array.from(node.children).forEach(function(li){blocks.push({type:'bulleted',content:li.innerHTML});});return;}
    if(tag==='ol'){Array.from(node.children).forEach(function(li){blocks.push({type:'numbered',content:li.innerHTML});});return;}
    if(tag==='pre'){blocks.push({type:'code',content:node.textContent});return;}
    if(tag==='blockquote'){blocks.push({type:'quote',content:node.innerHTML});return;}
    if(tag==='hr'){blocks.push({type:'divider',content:''});return;}
    if(tag==='table'){blocks.push({type:'table',content:node.outerHTML});return;}
    if(tag==='div'||tag==='span'||tag==='section'||tag==='article'){
      // Check if this is a saved column layout
      var style=node.getAttribute('style')||'';
      if(style.indexOf('display:flex')>=0||style.indexOf('display: flex')>=0){
        Array.from(node.childNodes).forEach(walk);
      }else{
        Array.from(node.childNodes).forEach(walk);
      }
      return;
    }
    blocks.push({type:'p',content:node.innerHTML||node.textContent});
  }
  Array.from(div.childNodes).forEach(walk);
  if(blocks.length===0)blocks.push({type:'p',content:''});
  return blocks;
}

// Extract block data from already-rendered .notion-block HTML
// (avoids parseBlocks swallowing UI handles as content blocks)
function extractComicBlocks(containerEl){
  var blocks=[];
  var bcs=containerEl.querySelectorAll('.block-content');
  bcs.forEach(function(bc){
    var nb=bc.closest('.notion-block');
    var type=nb?nb.dataset.type:'p';
    blocks.push({type:type,content:bc.innerHTML});
  });
  if(blocks.length===0)blocks.push({type:'p',content:''});
  return blocks;
}

function renderBlockHTML(b,idx){
  var inner=b.content||'';
  return '<div class="notion-block" data-idx="'+idx+'" data-type="'+b.type+'" draggable="true"><div class="block-handle" title="Drag to reorder">⋮⋮</div><div class="block-plus" title="Add block below" onclick="addBlockAfter('+idx+')">+</div><div class="block-content" contenteditable="true">'+inner+'</div></div>';
}

function renderAllBlocks(container,blocks){
  container.innerHTML=blocks.map(function(b,i){return renderBlockHTML(b,i);}).join('');
  refreshBlockBindings(container);
}

function serializeBlocks(container){
  var html='';
  var children=container.children;
  for(var i=0;i<children.length;i++){
    var child=children[i];
    if(child.classList.contains('block-row')){
      // Serialize column blocks
      var cols=child.querySelectorAll(':scope>.notion-block');
      var colHtml='';
      for(var j=0;j<cols.length;j++){
        var nb=cols[j];
        var type=nb.dataset.type,content=nb.querySelector('.block-content').innerHTML;
        if(type==='h1')colHtml+='<h2>'+content+'</h2>';
        else if(type==='h2')colHtml+='<h3>'+content+'</h3>';
        else if(type==='h3'||type==='h4')colHtml+='<h4>'+content+'</h4>';
        else if(type==='bulleted')colHtml+='<ul><li>'+content+'</li></ul>';
        else if(type==='numbered')colHtml+='<ol><li>'+content+'</li></ol>';
        else if(type==='code')colHtml+='<pre>'+content+'</pre>';
        else if(type==='quote')colHtml+='<blockquote>'+content+'</blockquote>';
        else if(type==='divider')colHtml+='<hr>';
        else if(type==='table')colHtml+=content;
        else colHtml+='<p>'+content+'</p>';
      }
      html+='<div style="display:flex;gap:12px">'+colHtml+'</div>';
    }else if(child.classList.contains('notion-block')){
      var type=child.dataset.type,content=child.querySelector('.block-content').innerHTML;
      if(type==='h1')html+='<h2>'+content+'</h2>';
      else if(type==='h2')html+='<h3>'+content+'</h3>';
      else if(type==='h3'||type==='h4')html+='<h4>'+content+'</h4>';
      else if(type==='bulleted')html+='<ul><li>'+content+'</li></ul>';
      else if(type==='numbered')html+='<ol><li>'+content+'</li></ol>';
      else if(type==='code')html+='<pre>'+content+'</pre>';
      else if(type==='quote')html+='<blockquote>'+content+'</blockquote>';
      else if(type==='divider')html+='<hr>';
      else if(type==='table')html+=content;
      else html+='<p>'+content+'</p>';
    }
  }
  return html;
}

function blockChanged(){
  if(!currentBlockPageId)return;
  clearTimeout(blockSaveTimer);
  var si=document.getElementById('saveIndicator');
  if(si){si.style.display='block';si.textContent='Saving…';}
  blockSaveTimer=setTimeout(async function(){
    var container=document.querySelector('.notion-blocks');
    if(!container)return;
    var html=serializeBlocks(container);
    var pp=await dbGet('pages',currentBlockPageId);
    if(pp){pp.content=html;pp.updatedAt=new Date().toISOString();await dbPut('pages',pp);}
    if(si){si.textContent='Saved';setTimeout(function(){si.style.display='none'},1500);}
  },1200);
}

function addBlockAfter(idx,type,content){
  var container=document.querySelector('.notion-blocks');
  if(!container)return;
  type=type||'p';content=content||'';
  var all=container.querySelectorAll('.notion-block');
  var html=renderBlockHTML({type:type,content:content},idx+1);
  if(idx>=0&&all[idx]){
    // Insert after the row if target is inside a block-row
    var targetBlock=all[idx];
    var row=targetBlock.closest('.block-row');
    if(row)row.insertAdjacentHTML('afterend',html);
    else targetBlock.insertAdjacentHTML('afterend',html);
  }else{
    container.insertAdjacentHTML('beforeend',html);
  }
  refreshBlockBindings(container);
  reindexBlocks(container);
  var all2=container.querySelectorAll('.block-content');
  var target=idx+1<all2.length?all2[idx+1]:all2[all2.length-1];
  if(target){target.focus();var r=document.createRange();r.selectNodeContents(target);r.collapse(false);var s=window.getSelection();s.removeAllRanges();s.addRange(r);}
  blockChanged();
}

function refreshBlockBindings(container){
  container.querySelectorAll('.block-content').forEach(function(bc){
    bc.onkeydown=blockKeydown;
    bc.oninput=blockChanged;
  });
  container.querySelectorAll('.notion-block').forEach(function(nb){
    nb.ondragstart=blockDragStart;
    nb.ondragover=blockDragOver;
    nb.ondrop=blockDrop;
    nb.ondragend=blockDragEnd;
  });
}

function reindexBlocks(container){
  container.querySelectorAll('.notion-block').forEach(function(nb,i){
    nb.dataset.idx=i;
    var plus=nb.querySelector('.block-plus');
    if(plus)plus.setAttribute('onclick','addBlockAfter('+i+')');
  });
}

function blockKeydown(e){
  var bc=e.target,block=bc.parentElement;
  var topContainer=block.closest('.notion-blocks');
  var all=topContainer?topContainer.querySelectorAll('.block-content'):document.querySelectorAll('.block-content');
  var idx=parseInt(block.dataset.idx);
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();addBlockAfter(idx);
  }
  if(e.key==='Backspace'&&bc.textContent===''&&all.length>1){
    e.preventDefault();
    var row=block.closest('.block-row');
    if(row&&row.children.length<=2){
      // If deleting would leave one block in row, unwrap the row
      var sibling=row.children[0]===block?row.children[1]:row.children[0];
      if(sibling){row.parentElement.insertBefore(sibling,row);row.remove();}
    }else{block.remove();}
    reindexBlocks(topContainer);blockChanged();
    if(idx>0)all[idx-1].focus();
  }
  if(e.key==='ArrowUp'){
    var sel=window.getSelection();
    if(sel.rangeCount&&sel.getRangeAt(0).startOffset===0&&idx>0){e.preventDefault();all[idx-1].focus();}
  }
  if(e.key==='ArrowDown'){
    var sel=window.getSelection();
    if(sel.rangeCount){var r=sel.getRangeAt(0);if(r.endOffset>=(r.endContainer.textContent||'').length&&idx<all.length-1){e.preventDefault();all[idx+1].focus();}}
  }
  if(e.key==='/'&&!slashActive){setTimeout(function(){if(bc.textContent.startsWith('/'))openSlashMenu(bc);},10);}
}

var draggedBlockIdx=null;
function blockDragStart(e){draggedBlockIdx=parseInt(e.target.closest('.notion-block').dataset.idx);e.target.closest('.notion-block').classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function blockDragEnd(e){
  var nb=e.target.closest('.notion-block');
  if(!nb)return;
  // Find all sibling blocks in the same container
  var container=nb.parentElement;
  if(container)container.querySelectorAll('.notion-block').forEach(function(b){b.classList.remove('dragging','drag-over','block-drop-left','block-drop-right');});
}
var dragOverTarget=null;
function blockDragOver(e){
  e.preventDefault();
  var nb=e.target.closest('.notion-block');
  if(!nb)return;
  var container=nb.parentElement;
  var dragged=container?container.querySelector('.notion-block.dragging'):null;
  if(!dragged||nb===dragged)return;
  if(dragOverTarget&&dragOverTarget!==nb){dragOverTarget.classList.remove('drag-over','block-drop-left','block-drop-right');}
  dragOverTarget=nb;
  var rect=nb.getBoundingClientRect();
  var xRel=(e.clientX-rect.left)/rect.width;
  nb.classList.remove('drag-over','block-drop-left','block-drop-right');
  if(xRel<0.25)nb.classList.add('block-drop-left');
  else if(xRel>0.75)nb.classList.add('block-drop-right');
  else nb.classList.add('drag-over');
}
function blockDrop(e){
  e.preventDefault();
  var target=e.target.closest('.notion-block');if(!target)return;
  var container=target.parentElement;if(!container)return;
  if(dragOverTarget)dragOverTarget.classList.remove('drag-over','block-drop-left','block-drop-right');
  var dragged=container.querySelector('.notion-block.dragging');
  if(!dragged||dragged===target)return;
  var rect=target.getBoundingClientRect();
  var xRel=(e.clientX-rect.left)/rect.width;
  if(xRel<0.25||xRel>0.75){
    var row=document.createElement('div');row.className='block-row';
    target.parentElement.insertBefore(row,target);
    if(xRel<0.25){row.appendChild(dragged);row.appendChild(target);}
    else{row.appendChild(target);row.appendChild(dragged);}
  }else{
    if(draggedBlockIdx<parseInt(target.dataset.idx))target.insertAdjacentElement('afterend',dragged);
    else target.insertAdjacentElement('beforebegin',dragged);
  }
  // Try both save mechanisms
  if(window._comicSaveFn)window._comicSaveFn();
  if(typeof blockChanged==='function'&&currentBlockPageId)blockChanged();
  draggedBlockIdx=null;dragOverTarget=null;
}

function setupBlockEditor(containerEl,html,pageId){
  currentBlockPageId=pageId;
  var blocks=parseBlocks(html);
  renderAllBlocks(containerEl,blocks);
}

      // Make each cp-body a self-contained mini Notion block editor
      var cw=document.getElementById('comicWrap');
      var comicBlockSaveTimer=null;
      if(cw){
        cw.querySelectorAll('.cp-body').forEach(function(cb,i){
          var innerHTML=cb.innerHTML;
          var blocks;
          // If already saved as block HTML, extract content from .block-content
          // directly to avoid parseBlocks recursively walking UI handles
          if(innerHTML.indexOf('block-content')!==-1){
            blocks=extractComicBlocks(cb);
          }else{
            blocks=parseBlocks(innerHTML);
          }
          // Render blocks without refreshBlockBindings (we'll bind manually)
          cb.innerHTML=blocks.map(function(b,j){return renderBlockHTML(b,j);}).join('');
          var container=cb;
          // Bind handlers for each block-content
          container.querySelectorAll('.block-content').forEach(function(bc){
            bindComicBlockHandlers(bc,container);
          });
          // Drag handlers
          container.querySelectorAll('.notion-block').forEach(function(nb){
            nb.ondragstart=blockDragStart;
            nb.ondragover=blockDragOver;
            nb.ondrop=blockDrop;
            nb.ondragend=blockDragEnd;
          });
        });
      }
      function reindexPanelBlocks(container){
        container.querySelectorAll('.notion-block').forEach(function(nb,j){
          nb.dataset.idx=j;
        });
      }
      function bindComicBlockHandlers(bc,container){
        // / slash menu + Enter/Backspace/Arrow
        bc.addEventListener('keydown',function(e){
          var el=this;
          if(e.key==='/'&&!slashActive){
            // Let browser insert '/', then check after brief delay
            setTimeout(function(){
              if(el.textContent&&el.textContent.indexOf('/')===0)openSlashMenu(el);
            },30);
            return;
          }
          var block=el.closest('.notion-block');
          if(!block)return;
          var all=container.querySelectorAll('.block-content');
          var idx=parseInt(block.dataset.idx);
          if(isNaN(idx))return;
          if(e.key==='Enter'&&!e.shiftKey){
            e.preventDefault();
            block.insertAdjacentHTML('afterend',renderBlockHTML({type:'p',content:''},idx+1));
            reindexPanelBlocks(container);
            var newBc=container.querySelectorAll('.block-content')[idx+1];
            if(newBc){bindComicBlockHandlers(newBc,container);newBc.focus();}
            scheduleComicSave();
            return;
          }
          if(e.key==='Backspace'&&!el.textContent&&all.length>1){
            e.preventDefault();block.remove();
            reindexPanelBlocks(container);scheduleComicSave();
            var all2=container.querySelectorAll('.block-content');
            if(idx>0&&all2[idx-1])all2[idx-1].focus();
            return;
          }
          if(e.key==='ArrowUp'){
            var s=window.getSelection();
            if(s.rangeCount&&s.getRangeAt(0).startOffset===0&&idx>0){e.preventDefault();all[idx-1].focus();}
          }
          if(e.key==='ArrowDown'){
            var s=window.getSelection();
            if(s.rangeCount){var r=s.getRangeAt(0);if(r.endOffset>=(r.endContainer.textContent||'').length&&idx<all.length-1){e.preventDefault();all[idx+1].focus();}}
          }
        });
        bc.addEventListener('input',function(){scheduleComicSave();});
      }
      function scheduleComicSave(){
        clearTimeout(comicBlockSaveTimer);
        var si=document.getElementById('saveIndicator');
        if(si){si.style.display='block';si.textContent='Saving…';}
        comicBlockSaveTimer=setTimeout(async function(){
          var pp=await dbGet('pages',pid);
          if(pp){pp.content=cw.innerHTML;pp.updatedAt=new Date().toISOString();await dbPut('pages',pp);}
          if(si){si.textContent='Saved';setTimeout(function(){si.style.display='none'},1500);}
        },1200);
      }
      window._comicSaveFn=scheduleComicSave;
    }else{
      // Inline-editable content pages (Purpose, Goals, Resources, Output, etc.)
      if(p){
        var isEditable=p.section!=='Literature'&&p.section!=='Results';
        if(isEditable){
          c.innerHTML='<div class="slide"><div class="page active">'+(p.section==='Goals'?'<div style="margin-bottom:12px"><button class="btn prim" onclick="aiGeneratePlan('+pid+')">🤖 AI Generate Goals & Plan</button><span id="aiGenStatus" style="font-size:9px;color:var(--muted);margin-left:8px"></span></div>':'')+'<div class="notion-blocks" id="blockContainer"></div><div class="save-indicator" id="saveIndicator" style="display:none">Saved</div></div></div>';
          setupBlockEditor(document.getElementById('blockContainer'),p.content||'',pid);

        }
      }else{
        c.innerHTML='<div class="slide"><div class="page active"><i>Not found</i></div></div>';
      }
    }
  }else if(name.startsWith('a_')){
    const aid=parseInt(name.slice(2));

function previewCSV(){
  const f=document.getElementById('amFile').files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2){document.getElementById('amPreview').textContent='Need at least 2 rows (header + data)';return}
    csvHeaders=lines[0].split(',').map(h=>h.trim());
    csvData=lines.slice(1,Math.min(lines.length,50)).map(l=>l.split(',').map(v=>v.trim()));
    const preview=lines.slice(0,Math.min(lines.length,21)).join('\n');
    document.getElementById('amPreview').textContent=preview;
    document.getElementById('amProcessBtn').disabled=false;
  };
  reader.readAsText(f);
}

async function processAnalysis(){
  const apiKey=await dbGet('settings','api_key');
  if(!apiKey){toast('Set API key first','var(--red)');return}
  document.getElementById('amStep1').classList.remove('active');
  document.getElementById('amStep2').classList.add('active');
  document.getElementById('amProgress').textContent='⏳ Sending to AI...';

  const sid=parseInt(document.getElementById('amSkill').value);
  const skill=await dbGet('skills',sid);
  const param=document.getElementById('amParam').value;
  const ep=(await dbGet('settings','api_endpoint'))?.value||'https://api.deepseek.com/v1/chat/completions';
  const model=(await dbGet('settings','api_model'))?.value||'deepseek-chat';
  const sysPrompt=(await dbGet('settings','system_prompt'))?.value||'You are Virgo.';

  const csvSample=JSON.stringify({headers:csvHeaders,rows:csvData.slice(0,30)});
  const chartTpl=skill?.chartTemplate||'{}';

  const prompt=`You are processing experimental data using the skill "${skill?.name}".\n\nSKILL: ${skill?.desc}\nKEY PARAMS TO EXTRACT: ${skill?.keyParams}\nCHART TEMPLATE: ${chartTpl}\nCHANGED PARAMETER: ${param||'none'}\nCSV DATA: ${csvSample}\n\nAnalyze this data. Return ONLY valid JSON (no markdown, no code fences):\n{\n  "chartData": { "labels": [...], "datasets": [{ "label": "...", "data": [...], "borderColor": "#2c5f8a", ... }] },\n  "chartOptions": { "scales": { "x": { "title": { "display": true, "text": "..." } }, "y": { "title": { "display": true, "text": "..." } } } },\n  "keyParams": { "param1": value, "param2": value, ... },\n  "summary": "2-3 sentence scientific summary of results."\n}`;

  try{
    const resp=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey.value},body:JSON.stringify({model,messages:[{role:'system',content:sysPrompt},{role:'user',content:prompt}],max_tokens:2000,temperature:0.2})});
    const data=await resp.json();
    document.getElementById('amProgress').textContent='✅ Processing complete';
    if(!data.choices){toast('AI error: '+JSON.stringify(data).slice(0,200),'var(--red)');closeAnalysisModal();return}

    const content=data.choices[0].message.content;
    // Extract JSON (may be wrapped in ```json ... ```)
    let json=content;
    const m=content.match(/```(?:json)?\s*([\s\S]*?)```/);
    if(m)json=m[1];
    const result=JSON.parse(json);

    // Generate publication-quality plot via matplotlib
    document.getElementById('amProgress').textContent='🎨 Generating plot...';
    var plotUrl='';
    try{
      var plotSpec={
        type:skill.chartType||'line',
        data:result.chartData||{},
        options:{
          xlabel:result.chartOptions?.scales?.x?.title?.text||'',
          ylabel:result.chartOptions?.scales?.y?.title?.text||'',
          title:(param?(param+': '):'')+skill.name,
          width:6, height:4
        }
      };
      // Transfer data from Chart.js format to matplotlib format
      if(result.chartData?.datasets){
        for(var ds of result.chartData.datasets){
          if(ds.data&&!ds.data_y){ds.data_y=ds.data;delete ds.data}
        }
      }
      var plotResp=await fetch('/plot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(plotSpec)});
      var plotData=await plotResp.json();
      plotUrl=plotData.url||'';
    }catch(e){console.warn('Plot generation failed, using Chart.js fallback',e)}

    // Save analysis
    const analysis={
      section:currentSectionForAnalysis,
      title:(param?(param+': '):'')+skill.name,
      skillId:sid,skillName:skill.name,
      param:param,
      plotUrl:plotUrl,
      chartData:result.chartData,chartOptions:result.chartOptions||{},
      chartType:skill.chartType,
      keyParams:result.keyParams||{},
      summary:result.summary||'',
      csvRaw:csvHeaders.join(',')+'\n'+csvData.map(r=>r.join(',')).join('\n'),
      projectId:getActiveProjectId(),
      createdAt:new Date().toISOString()
    };
    const aid=await dbPut('analyses',analysis);
    closeAnalysisModal();
    await buildSidebar();
    goPage('a_'+aid);
    toast('Analysis complete ✓');
  }catch(e){
    document.getElementById('amProgress').textContent='❌ Error: '+e.message;
    setTimeout(()=>{document.getElementById('amStep1').classList.add('active');document.getElementById('amStep2').classList.remove('active')},2000);
  }
}

async function aiGeneratePlan(pageId){
  const apiKey=await dbGet('settings','api_key');
  if(!apiKey){toast('Set API key first','var(--red)');return}
  var statusEl=document.getElementById('aiGenStatus');
  if(statusEl)statusEl.textContent='⏳ Reading context...';

  // Gather Purpose + Literature
  var allPages=await dbGetAll('pages'),literature=await dbGetAll('literature');
  var purpose='',litTexts=[];
  for(var p of allPages){
    if(p.section==='Purpose')purpose=(p.content||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    if(p.section==='Literature')litTexts.push((p.title||'')+': '+(p.content||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim());
  }
  for(var l of literature){
    litTexts.push('['+(l.year||'')+'] '+(l.title||'')+'. '+(l.authors||'')+'. '+(l.journal||'')+'. KEY: '+(l.notes||'').replace(/<[^>]+>/g,' ').slice(0,300));
  }
  if(!purpose){toast('Write Purpose page first','var(--red)');return}

  if(statusEl)statusEl.textContent='⏳ Calling AI...';
  const ep=(await dbGet('settings','api_endpoint'))?.value||'https://api.deepseek.com/v1/chat/completions';
  const model=(await dbGet('settings','api_model'))?.value||'deepseek-chat';

  const prompt=`You are an experimental research planner for materials science & electrochemistry.

PROJECT PURPOSE: ${purpose}
LITERATURE CONTEXT: ${litTexts.join(' | ').slice(0,3000)}

Generate a complete experimental plan. For each step, exhaustively list ALL process parameters (fixed AND variable) and ALL measurement parameters. Nothing should be hidden — every condition the experimenter needs to control or record must be listed.

Return ONLY valid JSON (no markdown, no code fences):
{
  "goals": [{"id":1, "goal":"Specific measurable goal", "status":"⬜ Pending"}],
  "steps": [
    {
      "number": 1,
      "title": "Descriptive step name",
      "processParams": {
        "fixed": [{"key":"Parameter name", "value":"Value", "unit":"unit"}],
        "variable": [{"key":"Parameter name", "values":["val1","val2"], "unit":"unit"}]
      },
      "measurementParams": [{"key":"What to measure", "method":"Technique", "settings":"Relevant settings"}],
      "benchmarks": [{"key":"Metric", "operator":"≤|≥|=|range", "target":"value", "unit":"unit"}]
    }
  ]
}`;

  try{
    const resp=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey.value},body:JSON.stringify({model,messages:[{role:'user',content:prompt}],max_tokens:8000,temperature:0.3})});
    const data=await resp.json();
    if(!data.choices){toast('AI error: '+JSON.stringify(data).slice(0,200),'var(--red)');if(statusEl)statusEl.textContent='❌ Failed';return}

    var content=data.choices[0].message.content;
    // Check if truncated (doesn't end with } or ])
    var trimmed=content.trim();
    if(trimmed.slice(-1)!=='}'&&trimmed.slice(-1)!==']'){
      // Try to recover: find last complete object/array
      var lastBrace=trimmed.lastIndexOf('}');
      var lastBracket=trimmed.lastIndexOf(']');
      var cutAt=Math.max(lastBrace,lastBracket);
      if(cutAt>0){trimmed=trimmed.slice(0,cutAt+1);console.warn('AI response truncated, recovered to position '+cutAt)}
    }
    var m=trimmed.match(/```(?:json)?\s*([\s\S]*?)```/);
    if(m)trimmed=m[1];
    var plan=safeJSONParse(trimmed);
    if(!plan){toast('AI response not valid JSON','var(--red)');if(statusEl)statusEl.textContent='❌ Bad JSON';return}

    if(statusEl)statusEl.textContent='💾 Saving plan...';
    var pid=getActiveProjectId();

    // 1. Update Goals page
    var goalsHtml='<div class="card"><h3>Project Goals</h3><table class="data-tbl"><tr><th>#</th><th>Goal</th><th>Status</th></tr>';
    for(var g of plan.goals||[]){
      goalsHtml+='<tr><td>'+(g.id||'')+'</td><td>'+(g.goal||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</td><td>'+(g.status||'⬜ Pending')+'</td></tr>';
    }
    goalsHtml+='</table></div>';
    var goalsPage=allPages.find(function(p){return p.section==='Goals'});
    if(goalsPage){goalsPage.content=goalsHtml;await dbPut('pages',goalsPage);}

    // 2. Create/update Experimental step pages + experiments
    var steps=plan.steps||[];
    for(var i=0;i<steps.length;i++){
      var s=steps[i];
      var sn=(i+1);
      var fixedHtml=(s.processParams?.fixed||[]).map(function(p){return '<b>'+p.key.replace(/&/g,'&amp;')+':</b> '+p.value+(p.unit?' '+p.unit:'')}).join('<br>');
      var varHtml=(s.processParams?.variable||[]).map(function(p){return '<b>'+p.key.replace(/&/g,'&amp;')+':</b> '+ (Array.isArray(p.values)?p.values.join(' / '):p.values)+(p.unit?' '+p.unit:'')}).join('<br>');
      var detHtml=(s.measurementParams||[]).map(function(p){return '<b>'+p.key.replace(/&/g,'&amp;')+'</b> — '+p.method+(p.settings?' ('+p.settings+')':'')}).join('<br>');
      var benchHtml=(s.benchmarks||[]).map(function(p){return '<b>'+p.key.replace(/&/g,'&amp;')+' '+p.operator+' '+p.target+'</b>'+(p.unit?' '+p.unit:'')}).join('<br>');

      var stepContent='<div class="card"><h3>Step '+sn+' — '+s.title.replace(/&/g,'&amp;')+'</h3><div class="comic-grid">'
        +'<div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body">'+(fixedHtml||'<i>None</i>')+'</div></div>'
        +'<div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body">'+(varHtml||'<i>None</i>')+'</div></div>'
        +'<div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body">'+(detHtml||'<i>TBD</i>')+'</div></div>'
        +'<div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body">'+(benchHtml||'<i>TBD</i>')+'</div></div>'
        +'</div></div>';

      var title=sn+'. '+s.title;
      var expPage=allPages.find(function(p){return p.section==='Experimental'&&p.title===title});
      if(expPage){expPage.content=stepContent;await dbPut('pages',expPage);}
      else{expPage={id:await dbPut('pages',{section:'Experimental',title:title,content:stepContent,projectId:pid,createdAt:new Date().toISOString()})};}

      // Save structured experiment record
      var expId=await dbPut('experiments',{
        projectId:pid,pageId:expPage.id,stepNumber:sn,title:s.title,
        processParams:s.processParams||{fixed:[],variable:[]},
        measurementParams:s.measurementParams||[],
        benchmarks:s.benchmarks||[],
        runs:buildExperimentRuns(s.processParams?.variable||[],s.benchmarks||[]),
        status:'planned',createdAt:new Date().toISOString()
      });

      // 3. Pre-fill Results page
      await syncResultsForStep(sn,title,pid);
    }

    if(statusEl)statusEl.textContent='✅ Done!';
    await buildSidebar();
    // Reload current Goals page
    var gp=allPages.find(function(p){return p.section==='Goals'});
    if(gp){goPage('p_'+gp.id);}
    toast('Generated '+steps.length+' steps ✓');
  }catch(e){
    if(statusEl)statusEl.textContent='❌ '+e.message;
    console.error(e);
  }
}
// Helpers
function buildExperimentRuns(variableParams,benchmarks){
  if(!variableParams||variableParams.length===0)return [{id:'run_1',variableValues:{},measurements:{},benchmarkResults:{},status:'pending'}];
  // Compute all combinations of variable values
  var keys=variableParams.map(function(p){return p.key});
  var valueSets=variableParams.map(function(p){return Array.isArray(p.values)?p.values:[p.values]});
  var combos=cartesian(valueSets);
  return combos.map(function(combo,i){
    var vv={};for(var j=0;j<keys.length;j++)vv[keys[j]]=combo[j];
    return {id:'run_'+(i+1),variableValues:vv,measurements:{},benchmarkResults:{},rawData:[],status:'pending'};
  });
}
function cartesian(arrays){return arrays.reduce(function(a,b){return a.flatMap(function(x){return b.map(function(y){return x.concat([y])})})},[[]]);}
function safeJSONParse(str){
  // Try vanilla parse first
  try{return JSON.parse(str)}catch(e){}
  // Fix common AI JSON issues
  try{
    // 1. Quote unquoted keys: {key: → {"key":
    var fixed=str.replace(/(\{|\,)\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*\:/g,'$1"$2":');
    // 2. Fix trailing commas: ,} → }  ,] → ]
    fixed=fixed.replace(/\,\s*\}/g,'}').replace(/\,\s*\]/g,']');
    // 3. Fix single quotes
    // (skip — rare in AI output)
    return JSON.parse(fixed);
  }catch(e2){
    console.error('safeJSONParse failed at:', str.slice(Math.max(0,(e2.message.match(/position (\d+)/)||[0,0])[1]-60), (e2.message.match(/position (\d+)/)||[0,str.length])[1]+60));
    console.error('Original error:', e2.message);
    return null;
  }
}
function syncResultsForStep(stepNum,stepTitle,pid){
  return dbGetAll('pages').then(function(allP){
    var base=stepTitle.replace(/^\d+\.\s*/,'');
    var title=stepNum+'. '+base;
    var existing=allP.find(function(p){return p.section==='Results'&&p.title===title&&p.projectId==pid});
    if(existing)return Promise.resolve(existing); // don't overwrite
    var html='<div class="card"><h3>'+esc(stepTitle)+' — Results</h3><p style="font-size:10px;color:var(--muted)">Fill in measurements for each experimental run. Click + Add Analysis to process data.</p>';
    html+='<table class="data-tbl"><tr><th>Run</th><th>Variable</th><th>Measurements</th><th>Pass?</th></tr><tr><td colspan="4" style="color:var(--muted)">Results will be entered during experiments</td></tr></table></div>';
    html+='<div style="display:flex;gap:8px;margin-top:8px"><button class="btn prim sm" onclick="openAnalysisModal(\''+escAttr(title)+'\')">+ Add Analysis</button></div>';
    return dbPut('pages',{section:'Results',title:title,content:html,projectId:pid,createdAt:new Date().toISOString()});
  });
}
