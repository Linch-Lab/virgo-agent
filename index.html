async function addAnalysisOverlay(aid,inputEl){
  var f=inputEl.files[0];
  if(!f)return;
  var a=await dbGet('analyses',aid);
  if(!a){toast('Analysis not found','var(--red)');return;}
  var reader=new FileReader();
  reader.onload=async function(ev){
    var text=ev.target.result;
    var lines=text.trim().split(/\r?\n/);
    if(lines.length<2){toast('CSV needs header + at least 1 row','var(--red)');return;}
    var headers=lines[0].split(',').map(function(h){return h.trim()});
    var xVals=[],yVals=[],extraCols=[];
    for(var i=1;i<Math.min(lines.length,2001);i++){
      var cells=lines[i].split(',').map(function(c){return c.trim()});
      if(cells.length>=1)xVals.push(isNaN(+cells[0])?cells[0]:+cells[0]);
      if(cells.length>=2)yVals.push(isNaN(+cells[1])?cells[1]:+cells[1]);
      for(var j=2;j<cells.length;j++){
        if(!extraCols[j-2])extraCols[j-2]=[];
        extraCols[j-2].push(isNaN(+cells[j])?cells[j]:+cells[j]);
      }
    }
    // Determine label from filename
    var label=f.name.replace(/\.(csv|txt|tsv)$/i,'');
    var colors=['#2c5f8a','#b33','#2a7d4f','#b8860b','#8b5cf6','#e07b39'];
    var existingCount=(a.chartData&&a.chartData.datasets)?a.chartData.datasets.length:0;
    var colorIdx=existingCount%colors.length;
    // Use new CSV's x-values; if same length as existing, use those
    var cd=a.chartData||{labels:[],datasets:[]};
    if(!cd.labels)cd.labels=[];
    if(!cd.datasets)cd.datasets=[];
    // Add primary y-column as new dataset
    cd.datasets.push({label:label,data:yVals,borderColor:colors[colorIdx],backgroundColor:colors[colorIdx],tension:0.3,pointRadius:2});
    // If new CSV has more x-values, update labels
    if(xVals.length>cd.labels.length)cd.labels=xVals.map(String);
    // Extra columns become additional datasets
    for(var ec=0;ec<extraCols.length;ec++){
      colorIdx=(colorIdx+1)%colors.length;
      cd.datasets.push({label:(headers[ec+2]||(label+'_col'+(ec+3))),data:extraCols[ec],borderColor:colors[colorIdx],backgroundColor:colors[colorIdx],tension:0.3,pointRadius:2});
    }
    a.chartData=cd;
    a.plotUrl=''; // clear matplotlib plot, use Chart.js for overlays
    await dbPut('analyses',a);
    goPage('a_'+aid);
    toast('Overlay added ✓');
  };
  reader.readAsText(f);
}

async function renderFlowchart(){
  var steps=await getStepPages();
  var order=await getFlowOrder();
  // Sort by saved order, fallback to title sort
  if(order){
    var map={};steps.forEach(function(s){map[s.id]=s});
    steps=order.map(function(id){return map[id]}).filter(Boolean);
    // Append any steps not in saved order
    steps.forEach(function(s){delete map[s.id]});
    for(var k in map)steps.push(map[k]);
  }else{
    steps.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
  }
  var h='<div class="card"><h3>Experimental Flow</h3><div class="flow-list" id="flowList">';
  steps.forEach(function(s,i){

];
var slashActive=false,slashQuery='',slashIdx=0,slashRange=null;

function initSlashMenu(edId){
  var ed=document.getElementById(edId);
  if(!ed)return;
  ed.addEventListener('keydown',function(e){
    if(e.key==='/'&&!slashActive){
      setTimeout(function(){openSlashMenu(ed);},10);
    }
    if(slashActive){
      if(e.key==='ArrowDown'){e.preventDefault();slashIdx=(slashIdx+1)%filteredSlash().length;renderSlashMenu();return}
      if(e.key==='ArrowUp'){e.preventDefault();slashIdx=(slashIdx-1+filteredSlash().length)%filteredSlash().length;renderSlashMenu();return}
      if(e.key==='Enter'){e.preventDefault();applySlashCommand(ed);return}
      if(e.key==='Escape'){closeSlashMenu();return}
      if(e.key==='Backspace'){
        setTimeout(function(){
          slashQuery=extractSlashQuery(ed);
          if(!slashQuery){closeSlashMenu();return}
          slashIdx=0;renderSlashMenu();
        },10);
        return;
      }
      setTimeout(function(){
        slashQuery=extractSlashQuery(ed);
        slashIdx=0;renderSlashMenu();
      },10);
    }
  });
  ed.addEventListener('click',function(){if(slashActive)closeSlashMenu();});
  document.addEventListener('click',function(e){
    if(slashActive&&!document.getElementById('slashMenu').contains(e.target)&&e.target!==ed)closeSlashMenu();
  });
}
function bindSlashToInline(){
  var ed=document.getElementById('inlineContent');
  if(!ed||ed._slashInit)return;ed._slashInit=true;
  initSlashMenu('inlineContent');
}

function openSlashMenu(ed){
  var sel=window.getSelection();
  if(!sel.rangeCount)return;
  var node=sel.anchorNode;if(!node)return;
  // Find the '/' position
  var text=node.textContent||'';
  var offset=sel.anchorOffset;
  var before=text.slice(0,offset);
  var slashPos=before.lastIndexOf('/');
  if(slashPos===-1)return;
  slashRange=document.createRange();
  slashRange.setStart(node,slashPos);
  slashRange.setEnd(node,offset);
  slashQuery=before.slice(slashPos+1);
  slashIdx=0;slashActive=true;
  var rect=sel.getRangeAt(0).getBoundingClientRect();
  var menu=document.getElementById('slashMenu');
  menu.style.top=(rect.bottom+4)+'px';
  menu.style.left=rect.left+'px';
  renderSlashMenu();
}

function extractSlashQuery(ed){
  var sel=window.getSelection();
  if(!sel.rangeCount)return'';
  var node=sel.anchorNode;if(!node)return'';
  var text=node.textContent||'';
  var before=text.slice(0,sel.anchorOffset);
  var slashPos=before.lastIndexOf('/');
  if(slashPos===-1)return'';
  return before.slice(slashPos+1);
}

function filteredSlash(){
  if(!slashQuery)return SLASH_COMMANDS;
  var q=slashQuery.toLowerCase();
  return SLASH_COMMANDS.filter(function(c){return c.label.toLowerCase().indexOf(q)>=0;});
}

function renderSlashMenu(){
  var menu=document.getElementById('slashMenu');
  var items=filteredSlash();
  if(items.length===0){menu.style.display='none';return}
  menu.style.display='block';
  menu.innerHTML=items.map(function(c,i){
    return'<div class=\"slash-item'+(i===slashIdx?' selected':'')+'\" data-idx=\"'+i+'\" onmousedown=\"applySlashByIdx('+i+')\">'+
      '<span class=\"slash-icon\">'+c.icon+'</span>'+
      '<span class=\"slash-label\">'+c.label+'</span>'+
      '<span class=\"slash-desc\">'+c.desc+'</span>'+
    '</div>';
  }).join('');
}

function applySlashCommand(ed){
  var items=filteredSlash();
  if(slashIdx>=items.length)return;
  var cmd=items[slashIdx];
  // Special: Image command opens file picker instead of inserting HTML
  if(cmd.label==='Image'){
    closeSlashMenu();
    if(slashRange){slashRange.deleteContents();}
    ed.focus();
    pickAndUploadImage();
    return;
  }
  // Delete the "/query" text
  if(slashRange){
    var sel=window.getSelection();
    sel.removeAllRanges();sel.addRange(slashRange);
    slashRange.deleteContents();
    // Insert placeholder then replace with HTML
    var placeholder=document.createTextNode('\u200B');
    slashRange.insertNode(placeholder);
    sel.removeAllRanges();
    var span=document.createElement('span');
    span.innerHTML=cmd.html;
    placeholder.parentNode.replaceChild(span,placeholder);
    // Move cursor after
    var newRange=document.createRange();
    newRange.setStartAfter(span);newRange.collapse(true);
    sel.addRange(newRange);
  }
  closeSlashMenu();ed.focus();
}

function applySlashByIdx(i){slashIdx=i;var ed=document.activeElement;if(ed&&(ed.classList.contains('block-content')||ed.id==='peContent'||ed.id==='inlineContent'))applySlashCommand(ed);}

function parseBibtex(bib){
  var entry={};
  var m=bib.match(/@\w+\s*\{[^,]*,\s*([\s\S]*)\}/i);
  if(!m)return null;
  var body=m[1];
  var fields=body.split(/,(?=\s*\w+\s*=)/);
  fields.forEach(function(f){
    var fm=f.match(/^\s*(\w+)\s*=\s*[{"]([^}"]*)[}"]/);
    if(fm)entry[fm[1].toLowerCase()]=fm[2];
  });
  entry.title=entry.title||'';
  entry.author=entry.author||'';
  entry.journal=entry.journal||'';
  entry.year=entry.year||'';
  entry.doi=entry.doi||'';
  return entry;
}

async function uploadImageBlob(blob){
  var fd=new FormData();
  fd.append('file',blob,'image.'+(blob.type.split('/')[1]||'png'));
  try{
    var resp=await fetch('/upload',{method:'POST',body:fd});
    if(!resp.ok)throw new Error('Upload failed: '+resp.status);
    var data=await resp.json();
    return data.url; // e.g., '/uploads/abc123.png'
  }catch(e){console.error('Image upload failed',e);return null}
}
async function handleImagePaste(e){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      e.preventDefault();
      var blob=items[i].getAsFile();
      var url=await uploadImageBlob(blob);
      if(url)insertImageAtCursor(url);
      return;
    }
  }
}
async function handleImageDrop(e){
  var file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/'))return;
  e.preventDefault();
  var url=await uploadImageBlob(file);
  if(url)insertImageAtCursor(url);
}
function pickAndUploadImage(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=async function(){
    if(inp.files[0]){
      var url=await uploadImageBlob(inp.files[0]);
      if(url)insertImageAtCursor(url);
    }
  };
  inp.click();
}
function insertImageAtCursor(url){
  var sel=window.getSelection();

    img.src=url;img.style.maxWidth='100%';img.style.borderRadius='4px';img.style.margin='8px 0';
    sel.getRangeAt(0).insertNode(img);

function openStepModal(){

  document.getElementById('smFixed').value='';document.getElementById('smVar').value='';

    });
    document.getElementById('smSkills').innerHTML=h||'<span style="font-size:9px;color:var(--muted)">No skills defined. Add via Skills template.</span>';
  });

}
function closeStepModal(){document.getElementById('stepModal').classList.remove('show')}
function comicLines(text){
  if(!text.trim())return'';
  return text.trim().split('\n').map(function(l){
    var m=l.match(/^(.+?):\s*(.+)$/);
    return m?'<b>'+esc(m[1])+':</b> '+esc(m[2]):esc(l);
  }).join('<br>');
}
async function getNextStepNum(){
  var steps=await getStepPages();
  var maxN=0;
  steps.forEach(function(s){
    var m=(s.title||'').match(/^(\d+)\./);
    if(m){var n=parseInt(m[1]);if(n>maxN)maxN=n;}
  });
  return maxN+1;
}
async function saveStep(){
  var title=document.getElementById('smTitle').value.trim();
  var fixed=comicLines(document.getElementById('smFixed').value);
  var vr=comicLines(document.getElementById('smVar').value);
  var detect=comicLines(document.getElementById('smDetect').value);
  var bench=comicLines(document.getElementById('smBench').value);
  if(!title){toast('Need a title','var(--red)');closeStepModal();return}
  var nextNum=await getNextStepNum();
  var pageTitle=nextNum+'. '+title;
  var content='<div class="card"><h3>Step '+nextNum+' — '+esc(title)+'</h3>'
    +'<div class="comic-grid">'
    +'<div class="comic-panel"><div class="cp-num">①</div><div class="cp-title">Fixed Parameters</div><div class="cp-body">'+fixed+'</div></div>'
    +'<div class="comic-panel"><div class="cp-num">②</div><div class="cp-title">Variable Parameters</div><div class="cp-body">'+vr+'</div></div>'
    +'<div class="comic-panel"><div class="cp-num">③</div><div class="cp-title">Detection</div><div class="cp-body">'+detect+'</div></div>'
    +'<div class="comic-panel"><div class="cp-num">④</div><div class="cp-title">Benchmark</div><div class="cp-body">'+bench+'</div></div>'
    +'</div></div>';
  var pid=getActiveProjectId();
  try{
    var id=await dbPut('pages',{section:'Experimental',title:pageTitle,content:content,projectId:pid,createdAt:new Date().toISOString()});
    await syncResultsForStep(nextNum,pageTitle,pid);
    // Create analysis entries for selected skills
    var cbs=document.querySelectorAll('.smSkillCb:checked');
    for(var i=0;i<cbs.length;i++){
      var sid=parseInt(cbs[i].value);
      var skill=await dbGet('skills',sid);
      if(skill){
        await dbPut('analyses',{
          section:pageTitle,
          title:(skill.name),
          skillId:sid,skillName:skill.name,
          param:'Step '+nextNum,
          chartData:{},chartOptions:{},
          chartType:skill.chartType,
          keyParams:{},
          summary:'Linked from Experimental step '+nextNum+'. Upload CSV data to process.',
          csvRaw:'',
          projectId:pid,
          createdAt:new Date().toISOString()
        });
      }
    }
    var order=await getFlowOrder()||[];
    if(order.indexOf(id)===-1)order.push(id);
    await saveFlowOrder(order);
    await buildSidebar();goPage('p_'+id);toast('Step '+nextNum+' added ✓'+(cbs.length?' + '+cbs.length+' analyses':''));
  }catch(e){toast('Error: '+e.message,'var(--red)');}
  closeStepModal();
}

var chatHistory=[];
async function sendChat(msg){
  const input=document.getElementById('chatInput');const text=msg||(input?input.value.trim():'');if(!text)return;if(input)input.value='';
  addChatMsg('user',text);chatHistory.push({role:'user',content:text});
  const apiKey=await dbGet('settings','api_key');if(!apiKey){addChatMsg('agent','⚠️ Set API key first.');return}
  const ep=(await dbGet('settings','api_endpoint'))?.value||'https://api.deepseek.com/v1/chat/completions';
  const model=(await dbGet('settings','api_model'))?.value||'deepseek-chat';
  const sysPrompt=(await dbGet('settings','system_prompt'))?.value||'You are Virgo.';
  const analyses=await dbGetAll('analyses');
  let ctx='';if(analyses.length>0)ctx+='\n\nAnalyses:\n'+analyses.map(function(a){return '#'+a.id+': '+a.title+' ('+a.skillName+')\n  '+(a.summary||'').slice(0,200);}).join('\n');
  const thinking=addChatMsg('agent','⏳ Thinking...');
  try{const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey.value},body:JSON.stringify({model,messages:[{role:'system',content:sysPrompt+ctx},...chatHistory.slice(-10)],max_tokens:1000,temperature:0.3})});const d=await r.json();thinking.remove();if(d.choices){const reply=d.choices[0].message.content;addChatMsg('agent',reply);chatHistory.push({role:'assistant',content:reply})}else{addChatMsg('agent','❌ '+JSON.stringify(d).slice(0,300))}}catch(e){thinking.remove();addChatMsg('agent','❌ '+e.message)}
  const msgs=document.getElementById('chatMsgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
}
function addChatMsg(role,text){const d=document.createElement('div');d.className='chat-msg '+role;d.textContent=text;const m=document.getElementById('chatMsgs');if(m)m.appendChild(d);return d}

async function handleImport(e){
  try{
    const t=await e.target.files[0].text();
    const d=JSON.parse(t);
    // P2: migration — handle older formats
    var stores=d.stores||{pages:d.pages||[],analyses:d.analyses||[],settings:d.settings||[],chat_history:d.chat_history||[]};
    if(!d.version||d.version<2){
      // v0/v1: flat keys
      stores.pages=d.pages||[];stores.analyses=d.analyses||[];
    }
    // P1: merge by id — update if exists, insert if new
    var total=0;
    const STORE_ORDER=['projects','settings','skills','pages','literature','analyses','experiments','chat_history'];
    for(var sn of STORE_ORDER){
      var records=stores[sn];
      if(!records||!Array.isArray(records))continue;
      for(var r of records){
        if(r.id){
          var existing=await dbGet(sn,r.id);
          if(existing){
            // Merge: keep existing fields that import doesn't override
            var merged=Object.assign({},existing,r);
            await dbPut(sn,merged);
          }else{
            await dbPut(sn,r);
          }
        }else{
          await dbPut(sn,r);
        }
        total++;
      }
    }
    toast('Imported: '+total+' records (merged)');
    await buildSidebar();refreshDBStats();refreshDashboard();
  }catch(ex){toast('Invalid JSON','var(--red)');console.error(ex)}
}

// ═══════════════════════════════════════
var presenting=false,slideOrder=[],slideIdx=0;
function togglePresent(){
  presenting=!presenting;
  document.body.classList.toggle('presenting',presenting);
  document.querySelector('.present-btn').textContent=presenting?'◼ Exit':'▶ Present';
  document.querySelector('.present-btn').classList.toggle('on',presenting);
  if(presenting){
    buildSlideOrder().then(()=>{
      // Find current page in slide order (match by currentPage string)
      var found=slideOrder.findIndex(function(s){return s.page===currentPage;});
      slideIdx=found>=0?found:0;
      updateSlideCounter();
    });
    document.addEventListener('keydown',pk);
  }else{
    document.removeEventListener('keydown',pk);
  }
}
async function buildSlideOrder(){
  var pid=activeProjectId;
  // Collect content pages
  var allP=await dbGetAll('pages')||[];
  var projP=allP.filter(function(p){return p.projectId==null||p.projectId==pid});
  var sections={};
  for(var p of projP){if(!sections[p.section])sections[p.section]=[];sections[p.section].push(p);}
  var order=['Purpose','Literature','Goals','Experimental','Results','Resources','Output'];
  // Collect literature items
  var allLit=await dbGetAll('literature')||[];
  var projLit=allLit.filter(function(l){return l.projectId==null||l.projectId==pid});
  var litBySection={};
  for(var l of projLit){if(!litBySection[l.section])litBySection[l.section]=[];litBySection[l.section].push(l);}
  slideOrder=[];
  for(var sec of order){
    if(sec==='Literature'){
      // Literature section page
      slideOrder.push({page:'sec_Literature',label:'📚 2. Literature'});
      // Individual literature items
      for(var s in litBySection){
        var items=litBySection[s];
        items.sort(function(a,b){return (b.createdAt||'').localeCompare(a.createdAt||'')});
        for(var l of items){slideOrder.push({page:'litdetail_'+l.id,label:l.title});}
      }
    }else if(sec==='Experimental'){
      // Flowchart overview page
      slideOrder.push({page:'sec_Experimental',label:'🧪 4. Experimental'});
      // Individual step pages
      var pgs=sections[sec];
      if(pgs){
        pgs.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
        for(var p of pgs){slideOrder.push({page:'p_'+p.id,label:p.title});}
      }
    }else if(sec==='Results'){
      // Results step pages
      var pgs=sections[sec];
      if(pgs){
        pgs.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
        for(var p of pgs){
          slideOrder.push({page:'p_'+p.id,label:p.title});
          // Individual analysis pages for this step
          var stepTitle=(p.title||'').replace(/\s*Results\s*$/,'');
          var allAnalyses=await dbGetAll('analyses')||[];
          var stepAnalyses=allAnalyses.filter(function(a){
            if(a.projectId!=null&&a.projectId!==pid)return false;
            var aSec=(a.section||'').replace(/\s*Results\s*$/,'');
            return aSec===stepTitle||aSec===(p.title||'')||(a.section||'')===(p.title||'')||(stepTitle&&(a.section||'')&&(a.section||'').indexOf(stepTitle)===0);
          });
          stepAnalyses.sort(function(a,b){return (b.createdAt||'').localeCompare(a.createdAt||'')});
          for(var a of stepAnalyses){slideOrder.push({page:'a_'+a.id,label:'🔬 '+(a.title||'Analysis')});}
        }
      }
    }else{
      var pgs=sections[sec];
      if(!pgs||pgs.length===0)continue;
      pgs.sort(function(a,b){return (a.title||'').localeCompare(b.title||'')});
      for(var p of pgs){slideOrder.push({page:'p_'+p.id,label:p.title});}
    }
  }
  // Uncategorized pages
  for(var sec in sections){
    if(order.indexOf(sec)>=0)continue;
    for(var p of sections[sec]){slideOrder.push({page:'p_'+p.id,label:p.title});}
  }
}
function updateSlideCounter(){
  var el=document.getElementById('slideCounter');
  if(el)el.textContent=(slideIdx+1)+' / '+slideOrder.length;
}
function pk(e){
  if(e.key==='Escape'){togglePresent();return;}
  if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
    e.preventDefault();
    var dir=e.key==='ArrowRight'?1:-1;
    var next=slideIdx+dir;
    if(next>=0&&next<slideOrder.length){
      slideIdx=next;
      goPage(slideOrder[slideIdx].page);
      updateSlideCounter();
    }
  }
}
function toast(msg,color){const t=document.createElement('div');t.className='toast';t.style.background=color||'var(--grn)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
