<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Virgo Agent</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0b;--bg2:#111114;--bdr:#2a2a30;--txt:#e8e8ec;--txt2:#9898a4;--acc:#6c5ce7;--acc2:#a78bfa;--red:#ef4444;--grn:#00c896}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  .login-box{width:100%;max-width:400px;padding:48px 40px}
  .logo{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin-bottom:40px;justify-content:center}
  .logo .icon{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  h1{font-size:26px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:-.5px}
  .sub{font-size:14px;color:var(--txt2);text-align:center;margin-bottom:32px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500}
  .field input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:14px;font-family:inherit;transition:border-color .2s;outline:none}
  .field input:focus{border-color:var(--acc)}
  .err{font-size:12px;color:var(--red);margin-bottom:12px;display:none;text-align:center}
  .err.show{display:block}
  .btn{width:100%;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
  .btn:hover{background:var(--acc2)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--txt2);font-size:11px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
  .oauth-btn{width:100%;padding:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
  .oauth-btn:hover{border-color:var(--txt2)}
  .oauth-btn.google{opacity:.4;cursor:not-allowed}
  .oauth-btn.google:hover{border-color:var(--bdr)}
  .oauth-btn .soon{font-size:10px;background:var(--bdr);color:var(--txt2);padding:1px 6px;border-radius:3px}
  .back{text-align:center;margin-top:24px;font-size:12px;color:var(--txt2)}
  .back a{color:var(--acc2);text-decoration:none}
  .back a:hover{text-decoration:underline}
  .toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;animation:fadeIn .3s;background:var(--grn);color:#fff}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="login-box">
  <div class="logo"><div class="icon">♍</div>Virgo Agent</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your research workspace</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="submitBtn" onclick="doLogin()">Sign In</button>

  <div class="divider">or</div>
  <button class="oauth-btn google" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google <span class="soon">Soon</span>
  </button>

  <div class="back"><a href="/">← Back to home</a></div>
</div>

<script>
const BACKEND_URL='https://virgo-agent-api.onrender.com';

async function doLogin(){
  var email=document.getElementById('email').value.trim();
  var pass=document.getElementById('password').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('submitBtn');
  err.classList.remove('show');

  if(!email||!pass){err.textContent='Email and password required';err.classList.add('show');return}

  btn.disabled=true;btn.textContent='Signing in...';

  try{
    var r=await fetch(BACKEND_URL+'/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pass})
    });
    var d=await r.json();
    if(!r.ok){
      if(r.status===403){err.textContent='⏳ Virgo Agent is in private beta. Access is currently by invitation only.'}
      else{err.textContent=d.detail||'Login failed'}
      err.classList.add('show');
      btn.disabled=false;btn.textContent='Sign In';
      return;
    }
    // Success
    localStorage.setItem('vg_auth_token',d.token);
    localStorage.setItem('vg_auth_user',JSON.stringify(d.user));
    window.location.href='/app';
  }catch(e){
    err.textContent='Network error. Please try again.';
    err.classList.add('show');
    btn.disabled=false;btn.textContent='Sign In';
  }
}

// Enter key submits
document.getElementById('password').addEventListener('keydown',function(e){
  if(e.key==='Enter')doLogin();
});

// Auto-redirect if already logged in
if(localStorage.getItem('vg_auth_token')){
  window.location.href='/app';
}
</script>

</body>
</html>
