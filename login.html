<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Virgo Agent</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0b;--bg2:#111114;--bdr:#2a2a30;--txt:#e8e8ec;--txt2:#9898a4;--acc:#6c5ce7;--acc2:#a78bfa;--red:#ef4444}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  .login-box{width:100%;max-width:400px;padding:48px 40px}
  .logo{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin-bottom:40px;justify-content:center}
  .logo .icon{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  h1{font-size:26px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:-.5px}
  .sub{font-size:14px;color:var(--txt2);text-align:center;margin-bottom:32px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:6px;font-weight:500}
  .field input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:14px;font-family:inherit;transition:border-color .2s;outline:none}
  .field input:focus{border-color:var(--acc)}
  .err{font-size:12px;color:var(--red);margin-bottom:12px;display:none;text-align:center}
  .err.show{display:block}
  .btn{width:100%;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
  .btn:hover{background:var(--acc2)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .back{text-align:center;margin-top:24px}
  .back a{color:var(--txt2);font-size:13px;text-decoration:none}
  .back a:hover{color:var(--txt)}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo"><div class="icon">V</div> Virgo Agent</div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your research workspace</p>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="submitBtn" onclick="doLogin()">Sign In</button>
  <div class="back"><a href="/">← Back to home</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://mtshudmynuedafqixbvj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_97FLsYeAC_P5WWWeSkfvgQ_H99sN3VU';
const ALLOWED_EMAILS = ['satb03@gmail.com'];

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: window.localStorage, autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
});

// Auto-redirect to /app/ if already logged in
(async () => {
  try {
    const { data } = await supabase.auth.getSession();
    if (data?.session) { window.location.href = '/app'; }
  } catch(e) {}
})();

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('submitBtn');
  err.classList.remove('show');

  if (!email || !pass) { err.textContent = 'Email and password required'; err.classList.add('show'); return; }
  if (!ALLOWED_EMAILS.includes(email)) { err.textContent = '⏳ Virgo Agent is in private beta. Access is by invitation only.'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    window.location.href = '/app';
  } catch(e) {
    err.textContent = e.message || 'Login failed. Please try again.';
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

// Enter key submits
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
